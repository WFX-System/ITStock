<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>RYG Stock — ตัดทรัพย์สิน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<style>
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.filter-bar input,.filter-bar select{width:auto;flex:1;min-width:140px;padding:8px 12px;font-size:13px;}
.filter-bar .btn{white-space:nowrap;flex-shrink:0;}

.year-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.year-tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--bdrm);background:var(--surf);color:var(--tx2);cursor:pointer;transition:all .15s;font-family:var(--font);}
.year-tab:hover{border-color:var(--g);color:var(--g);}
.year-tab.active{background:var(--g);color:#fff;border-color:var(--g);}

.year-group{margin-bottom:1rem;border:1px solid var(--bdr);border-radius:16px;overflow:hidden;}
.year-header{display:flex;align-items:center;gap:10px;padding:.7rem 1rem;background:var(--surf);cursor:pointer;user-select:none;transition:background .12s;}
.year-header:hover{background:var(--gll);}
.year-header.open{background:var(--gll);border-bottom:1px solid var(--gl);}
.year-icon{font-size:18px;}
.year-label{font-size:14px;font-weight:700;flex:1;}
.year-count{font-size:12px;color:var(--tx3);}
.year-arrow{font-size:11px;color:var(--tx3);transition:transform .2s;}
.year-header.open .year-arrow{transform:rotate(90deg);}
.year-body{display:none;}
.year-body.open{display:block;}

.dis-row{display:flex;align-items:center;gap:10px;padding:.65rem 1rem;border-bottom:1px solid var(--bdr);transition:background .1s;cursor:pointer;}
.dis-row:last-child{border-bottom:none;}
.dis-row:hover{background:#F8FAFC;}
.dis-row.is-sold{background:#F0FDF4;}
.dis-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;}
.dis-thumb img{width:100%;height:100%;object-fit:cover;border-radius:7px;}
.dis-info{flex:1;min-width:0;}
.dis-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dis-sn{font-size:11px;font-family:var(--mono);color:#1D4ED8;margin-top:1px;}
.dis-ref{font-size:11px;font-family:var(--mono);color:var(--gd);background:var(--gll);border-radius:4px;padding:1px 5px;display:inline-block;margin-top:2px;}
.dis-meta{font-size:11px;color:var(--tx3);}
.dis-actions{display:flex;gap:4px;flex-shrink:0;flex-direction:column;align-items:flex-end;}

.badge-dis{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.badge-dis-disposed{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;}
.badge-dis-pending{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A;}
.badge-dis-approved{background:var(--gll);color:var(--gd);border:1px solid var(--gl);}
.badge-dis-sold{background:#F0FDF4;color:#166534;border:1px solid #86EFAC;}

.sold-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#DCFCE7;color:#166534;border:1px solid #86EFAC;}

/* Category badge */
.cat-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;border:1px solid transparent;}

.img-upload-zone{border:2px dashed var(--bdrm);border-radius:10px;padding:1rem;text-align:center;cursor:pointer;transition:.2s;background:var(--bg);margin-bottom:.75rem;}
.img-upload-zone:hover,.img-upload-zone.drag{border-color:var(--g);background:var(--gll);}
.img-upload-zone .uz-icon{font-size:26px;margin-bottom:4px;}
.img-upload-zone .uz-text{font-size:12px;color:var(--tx3);}

.img-preview-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem;}
.img-preview-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--bdrm);cursor:pointer;flex-shrink:0;}
.img-preview-thumb img{width:100%;height:100%;object-fit:cover;}
.img-preview-del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.img-uploading{opacity:.5;pointer-events:none;}

.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:1rem;}
.gallery-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;cursor:pointer;border:1px solid var(--bdr);background:var(--bg);}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .2s;}
.gallery-item:hover img{transform:scale(1.05);}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;padding:20px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain;}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;line-height:1;}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.stat-box{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:.75rem;text-align:center;}
.stat-num{font-size:20px;font-weight:700;color:var(--g);font-family:var(--mono);}
.stat-lbl{font-size:10px;color:var(--tx3);margin-top:2px;}

.reason-chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#F3F4F6;color:var(--tx2);border:1px solid var(--bdrm);}

.import-dis-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:var(--bg);margin-bottom:4px;font-size:12px;}
.import-dis-num{font-size:12px;color:var(--tx3);min-width:20px;}
.import-dis-ref{font-family:var(--mono);font-size:11px;color:#1D4ED8;flex:1;}
.import-dis-sn{font-family:var(--mono);font-size:11px;color:var(--gd);}

.btn-sold{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid #86EFAC;background:#F0FDF4;color:#166534;cursor:pointer;transition:all .15s;font-family:var(--font);}
.btn-sold:hover{background:#DCFCE7;border-color:#4ADE80;}
.btn-sold.is-sold{background:#166534;color:#fff;border-color:#166534;}
.btn-sold.is-sold:hover{background:#15803D;}

.import-tabs{display:flex;gap:0;margin-bottom:1rem;border-radius:10px;overflow:hidden;border:1px solid var(--bdrm);}
.import-tab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:700;background:var(--bg);color:var(--tx2);cursor:pointer;border:none;transition:all .15s;font-family:var(--font);}
.import-tab.active{background:var(--g);color:#fff;}
.import-tab:not(:last-child){border-right:1px solid var(--bdrm);}

.excel-hint{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:.6rem .8rem;font-size:11px;color:#1E40AF;margin-bottom:.75rem;line-height:1.6;}

/* ─── Category Manager ─── */
.cat-manager{border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:.75rem;}
.cat-manager-header{padding:.6rem 1rem;background:var(--surf);font-size:12px;font-weight:700;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.cat-item{display:flex;align-items:center;gap:8px;padding:.55rem 1rem;border-bottom:1px solid var(--bdr);}
.cat-item:last-child{border-bottom:none;}
.cat-icon-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.cat-item-name{flex:1;font-size:13px;font-weight:600;}
.cat-item-count{font-size:11px;color:var(--tx3);}
.cat-edit-btn{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--bdrm);background:var(--bg);cursor:pointer;color:var(--tx2);}
.cat-del-btn{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #FECACA;background:#FEF2F2;cursor:pointer;color:#991B1B;}

/* Emoji picker row */
.emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin:.5rem 0;}
.emoji-opt{font-size:18px;padding:4px 6px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:.1s;}
.emoji-opt:hover,.emoji-opt.sel{border-color:var(--g);background:var(--gll);}

/* Color swatch row */
.color-row{display:flex;flex-wrap:wrap;gap:6px;margin:.5rem 0;}
.color-swatch{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:.1s;}
.color-swatch:hover,.color-swatch.sel{border-color:#333;transform:scale(1.1);}

@media(max-width:640px){
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  .filter-bar{gap:6px;}
  .filter-bar input,.filter-bar select{min-width:0;}
}
</style>
</head>
<body>
<div id="loadingScreen">
  <div style="width:52px;height:52px;background:#1D9E75;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;">📦</div>
  <div style="font-size:15px;font-weight:700;">RYG Stock System</div>
  <div class="spinner"></div>
</div>

<div id="mainApp">
  <div class="topbar">
    <div class="topbar-logo">📦</div>
    <span class="topbar-title">RYG Stock</span>
    <div class="user-mini">
      <img id="uAvatar" class="user-ava" src="" onerror="this.style.display='none'" alt=""/>
      <span id="uFallback" class="user-ava"></span>
      <span id="uName" class="user-name-top"></span>
      <span id="uRole" class="badge-role badge-admin"></span>
      <button class="btn-topout" onclick="doLogout()">ออก</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="content" id="mainContent">
    <div class="empty-state">กำลังโหลด...</div>
  </div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<div id="notif"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<script>
const IMGBB_KEY = '4aecea8adeacd9e1dc7815e351021b99';

// ─── Default categories (used if Firestore empty) ─────────
const DEFAULT_CATS = [
  { id:'computer',  name:'Computer',  icon:'💻', color:'#DBEAFE', textColor:'#1E40AF' },
  { id:'ups',       name:'UPS',       icon:'🔋', color:'#FEF9C3', textColor:'#854D0E' },
  { id:'monitor',   name:'Monitor',   icon:'🖥️',  color:'#F3E8FF', textColor:'#6B21A8' },
  { id:'printer',   name:'Printer',   icon:'🖨️',  color:'#FEE2E2', textColor:'#991B1B' },
  { id:'network',   name:'Network',   icon:'🌐', color:'#DCFCE7', textColor:'#166534' },
  { id:'phone',     name:'Phone',     icon:'📱', color:'#FFE4E6', textColor:'#9F1239' },
  { id:'furniture', name:'Furniture', icon:'🪑', color:'#FEF3C7', textColor:'#92400E' },
  { id:'other',     name:'อื่นๆ',     icon:'📦', color:'#F3F4F6', textColor:'#374151' },
];

const PRESET_EMOJIS = ['💻','🖥️','🖨️','⌨️','🖱️','📱','📷','🎥','📺','🔋','🔌','🌐','📡','🖲️','💾','📀','🗂️','🪑','🗄️','🔧','⚙️','🏷️','📦','🗑️','🔑'];
const PRESET_COLORS = [
  {bg:'#DBEAFE',tx:'#1E40AF'},{bg:'#F3E8FF',tx:'#6B21A8'},{bg:'#FEE2E2',tx:'#991B1B'},
  {bg:'#DCFCE7',tx:'#166534'},{bg:'#FEF9C3',tx:'#854D0E'},{bg:'#FFE4E6',tx:'#9F1239'},
  {bg:'#FEF3C7',tx:'#92400E'},{bg:'#E0F2FE',tx:'#075985'},{bg:'#F0FDF4',tx:'#14532D'},
  {bg:'#FDF4FF',tx:'#701A75'},{bg:'#FFF7ED',tx:'#7C2D12'},{bg:'#F3F4F6',tx:'#374151'},
  {bg:'#ECFEFF',tx:'#155E75'},{bg:'#F0FFF4',tx:'#145A32'},{bg:'#FFFBEB',tx:'#78350F'},
];

// ─── State ─────────────────────────────────────────────────
let currentUser = null, currentRole = 'user', db = null;
let allDisposed = [];
let filteredDisposed = [];
let allCategories = [];   // loaded from Firestore
let selectedYear = 'all';
let searchQ = '';
let filterStatus = 'all';
let filterCategory = 'all';
let uploadedUrls = [];

// ─── Init ──────────────────────────────────────────────────
initShell('dispose', async (user, role, firestore) => {
  currentUser = user;
  currentRole = role;
  db = firestore;
  await loadCategories();
  renderPage();
  await loadDisposed();
});

// ─── Load categories ───────────────────────────────────────
async function loadCategories() {
  try {
    const snap = await db.collection('assetCategories').orderBy('order','asc').get();
    if (snap.empty) {
      // Seed defaults
      allCategories = DEFAULT_CATS;
      await seedDefaultCategories();
    } else {
      allCategories = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
    }
  } catch(e) {
    allCategories = DEFAULT_CATS;
  }
}

async function seedDefaultCategories() {
  try {
    const batch = db.batch();
    DEFAULT_CATS.forEach((c, i) => {
      const ref = db.collection('assetCategories').doc(c.id);
      batch.set(ref, { name: c.name, icon: c.icon, color: c.color, textColor: c.textColor, order: i });
    });
    await batch.commit();
    // Reload with docIds
    const snap = await db.collection('assetCategories').orderBy('order','asc').get();
    allCategories = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
  } catch(e) { /* ignore seed errors */ }
}

function getCat(catId) {
  return allCategories.find(c => c.docId === catId || c.id === catId) || null;
}

// ─── Load disposed ─────────────────────────────────────────
async function loadDisposed() {
  try {
    const snap = await db.collection('disposed').orderBy('disposedAt', 'desc').get();
    allDisposed = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
    applyFilter();
    renderPage();
  } catch (e) {
    document.getElementById('mainContent').innerHTML =
      `<div class="empty-state" style="color:var(--r)">โหลดไม่สำเร็จ: ${e.message}</div>`;
  }
}

// ─── Filter ────────────────────────────────────────────────
function applyFilter() {
  let list = [...allDisposed];
  if (filterStatus === 'sold') {
    list = list.filter(d => d.sold === true);
  } else if (filterStatus !== 'all') {
    list = list.filter(d => d.status === filterStatus);
  }
  if (filterCategory !== 'all') {
    list = list.filter(d => d.category === filterCategory);
  }
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(d =>
      (d.assetNo||'').toLowerCase().includes(q) ||
      (d.serial||'').toLowerCase().includes(q) ||
      (d.name||'').toLowerCase().includes(q) ||
      (d.docNo||'').toLowerCase().includes(q) ||
      (d.remark||'').toLowerCase().includes(q)
    );
  }
  if (selectedYear !== 'all') {
    list = list.filter(d => getYear(d.disposedAt) === parseInt(selectedYear));
  }
  filteredDisposed = list;
}

// ─── Date helpers ──────────────────────────────────────────
function getYear(ts) {
  if (!ts) return new Date().getFullYear();
  try { const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000); return d.getFullYear(); }
  catch { return new Date().getFullYear(); }
}
function tsToInputVal(ts) {
  if (!ts) return '';
  try { const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000); return d.toISOString().split('T')[0]; }
  catch { return ''; }
}
function inputValToFirestore(val) {
  if (!val) return firebase.firestore.FieldValue.serverTimestamp();
  return firebase.firestore.Timestamp.fromDate(new Date(val + 'T00:00:00'));
}
function groupByYear(list) {
  const map = {};
  list.forEach(d => { const y = getYear(d.disposedAt); if (!map[y]) map[y] = []; map[y].push(d); });
  return map;
}
function getAvailableYears() {
  const ySet = new Set(allDisposed.map(d => getYear(d.disposedAt)));
  return [...ySet].sort((a, b) => b - a);
}

// ─── Category select HTML ──────────────────────────────────
function buildCatOptions(selected) {
  const opts = allCategories.map(c =>
    `<option value="${c.docId||c.id}" ${selected===(c.docId||c.id)?'selected':''}>${c.icon} ${c.name}</option>`
  ).join('');
  return `<option value="">— ไม่ระบุประเภท —</option>` + opts;
}

// ─── Render page ───────────────────────────────────────────
function renderPage() {
  const years = getAvailableYears();
  const totalCount    = allDisposed.length;
  const pendingCount  = allDisposed.filter(d => d.status === 'pending').length;
  const approvedCount = allDisposed.filter(d => d.status === 'approved').length;
  const soldCount     = allDisposed.filter(d => d.sold === true).length;
  const isAdmin = currentRole === 'admin';

  // Build category filter options
  const catFilterOpts = allCategories.map(c =>
    `<option value="${c.docId||c.id}" ${filterCategory===(c.docId||c.id)?'selected':''}>${c.icon} ${c.name}</option>`
  ).join('');

  document.getElementById('mainContent').innerHTML = `
  <div class="stats-bar">
    <div class="stat-box"><div class="stat-num">${totalCount}</div><div class="stat-lbl">ทั้งหมด</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--am)">${pendingCount}</div><div class="stat-lbl">รอดำเนินการ</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--g)">${approvedCount}</div><div class="stat-lbl">อนุมัติแล้ว</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#166534">${soldCount}</div><div class="stat-lbl">ขายแล้ว</div></div>
  </div>

  <div class="flex jb items-c section-gap" style="gap:8px;flex-wrap:wrap;">
    <span style="font-size:15px;font-weight:700;">♻️ ตัดทรัพย์สิน</span>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="btn btn-sm" onclick="exportExcel()">📊 Export</button>
      ${isAdmin ? `<button class="btn btn-sm" onclick="openImportModal()">📄 Import</button>` : ''}
      ${isAdmin ? `<button class="btn btn-sm" onclick="openCategoryManager()">🏷️ ประเภท</button>` : ''}
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ เพิ่มรายการ</button>
    </div>
  </div>

  <div class="filter-bar">
    <input type="search" id="searchInput" placeholder="🔍 ค้นหา รหัส / S/N / ชื่อ..." value="${searchQ}" oninput="onSearch(this.value)"/>
    <select id="statusFilter" onchange="onStatusFilter(this.value)">
      <option value="all" ${filterStatus==='all'?'selected':''}>สถานะทั้งหมด</option>
      <option value="pending" ${filterStatus==='pending'?'selected':''}>⏳ รอดำเนินการ</option>
      <option value="approved" ${filterStatus==='approved'?'selected':''}>✅ อนุมัติแล้ว</option>
      <option value="disposed" ${filterStatus==='disposed'?'selected':''}>🗑️ ตัดออกแล้ว</option>
      <option value="sold" ${filterStatus==='sold'?'selected':''}>💰 ขายแล้ว</option>
    </select>
    <select id="catFilter" onchange="onCatFilter(this.value)">
      <option value="all" ${filterCategory==='all'?'selected':''}>ประเภททั้งหมด</option>
      ${catFilterOpts}
    </select>
  </div>

  <div class="year-tabs">
    <button class="year-tab ${selectedYear==='all'?'active':''}" onclick="selectYear('all')">ทั้งหมด (${allDisposed.length})</button>
    ${years.map(y => {
      const cnt = allDisposed.filter(d => getYear(d.disposedAt) === y).length;
      return `<button class="year-tab ${selectedYear==y?'active':''}" onclick="selectYear('${y}')">${y} (${cnt})</button>`;
    }).join('')}
  </div>

  <div id="disposeList"></div>`;

  renderList();
}

function renderList() {
  applyFilter();
  const container = document.getElementById('disposeList');
  if (!container) return;
  if (filteredDisposed.length === 0) {
    container.innerHTML = `<div class="empty-state"><div style="font-size:32px;margin-bottom:8px">♻️</div><div>ไม่พบรายการตัดทรัพย์สิน</div></div>`;
    return;
  }
  if (selectedYear !== 'all') {
    container.innerHTML = `<div class="card">${filteredDisposed.map(d => renderDisRow(d)).join('')}</div>`;
    return;
  }
  const grouped = groupByYear(filteredDisposed);
  const years = Object.keys(grouped).sort((a, b) => b - a);
  container.innerHTML = years.map((y, idx) => {
    const items = grouped[y];

function renderCatBadge(catId) {
  if (!catId) return '';
  const c = getCat(catId);
  if (!c) return '';
  return `<span class="cat-badge" style="background:${c.color};color:${c.textColor};border-color:${c.textColor}33">${c.icon} ${c.name}</span>`;
}

function renderDisRow(d) {
  const thumb = d.images && d.images.length > 0
    ? `<div class="dis-thumb"><img src="${d.images[0]}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='📦'"/></div>`
    : `<div class="dis-thumb">📦</div>`;
  const statusMap = { pending:['badge-dis-pending','⏳ รอ'], approved:['badge-dis-approved','✅ อนุมัติ'], disposed:['badge-dis-disposed','🗑️ ตัดออก'] };
  const [sc, sl] = statusMap[d.status||'pending'] || statusMap.pending;
  const imgCount = d.images ? d.images.length : 0;
  return `<div class="dis-row ${d.sold?'is-sold':''}" onclick="openDetail('${d.docId}')">
    ${thumb}
    <div class="dis-info">
      <div class="dis-name">${d.name || '(ไม่ระบุชื่อ)'}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;">
        ${d.assetNo ? `<div class="dis-ref">${d.assetNo}</div>` : ''}
        ${renderCatBadge(d.category)}
      </div>
      ${d.serial ? `<div class="dis-sn">S/N: ${d.serial}</div>` : ''}
      <div class="dis-meta">${d.docNo ? `เอกสาร: ${d.docNo} · ` : ''}${formatDT(d.disposedAt)}${imgCount > 0 ? ` · 📷 ${imgCount}` : ''}</div>
    </div>
    <div class="dis-actions">
      <span class="badge-dis ${sc}">${sl}</span>
      ${d.sold ? `<span class="sold-tag">💰 ขายแล้ว</span>` : ''}
    </div>
  </div>`;
}

async function deleteCategory(catId, usedCount) {
  const c = getCat(catId);
  if (!c) return;
  const msg = usedCount > 0
    ? `ประเภท "${c.name}" ถูกใช้งานใน ${usedCount} รายการ\nการลบจะทำให้รายการเหล่านั้นไม่มีประเภท\nยืนยันการลบ?`
    : `ลบประเภท "${c.name}"?`;
  if (!confirm(msg)) return;
  try {
    await db.collection('assetCategories').doc(catId).delete();
    allCategories = allCategories.filter(c => (c.docId||c.id) !== catId);
    showNotif(`ลบประเภท "${c.name}" สำเร็จ`);
    refreshCatManagerBody();
    renderPage();
    renderList();
  } catch(e) { showNotif('ลบไม่สำเร็จ: ' + e.message, 'error'); }
}

let currentImportTab = 'text';
function switchImportTab(tab) {
  currentImportTab = tab;
  document.getElementById('importTextPane').style.display = tab === 'text' ? '' : 'none';
  document.getElementById('importExcelPane').style.display = tab === 'excel' ? '' : 'none';
  document.getElementById('tabText').classList.toggle('active', tab === 'text');
  document.getElementById('tabExcel').classList.toggle('active', tab === 'excel');
  document.getElementById('importPreview').innerHTML = '';
  document.getElementById('importConfirmBtn').disabled = true;
  parsedImportRows = [];
}

function handleExcelDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) readExcelFile(file);
}
function handleExcelFile(input) {
  const file = input.files[0]; if (file) readExcelFile(file); input.value = '';
}
function readExcelFile(file) {
  const statusEl = document.getElementById('excelReadStatus');
  if (statusEl) statusEl.textContent = 'กำลังอ่านไฟล์...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { if (statusEl) statusEl.textContent = 'ไม่พบข้อมูลในไฟล์'; return; }
      parsedImportRows = rows.map(r => {
        const assetNo  = String(r.assetNo  || r['รหัสทรัพย์สิน'] || '').trim();
        const serial   = String(r.serial   || r['S/N'] || '').trim();
        const name     = String(r.name     || r['ชื่อ'] || '').trim();
        const docNo    = String(r.docNo    || r['เลขที่เอกสาร'] || '').trim();
        const category = String(r.category || r['ประเภท'] || '').trim();
        const reason   = String(r.reason   || r['สาเหตุ'] || '').trim();
        const status   = String(r.status   || r['สถานะ'] || '').trim();

function tsToExcelDate(ts) {

  catch { return ''; }
}

let parsedImportRows = [];

function previewImport() {
  if (currentImportTab === 'text') {
    const raw = document.getElementById('importText')?.value.trim() || '';
    if (!raw) { showNotif('กรุณาวางข้อมูล', 'error'); return; }
    parsedImportRows = parseImportText(raw);
  }
  const preview = document.getElementById('importPreview');
  if (!parsedImportRows.length) {
    preview.innerHTML = `<div class="fz12" style="color:var(--r)">ไม่พบข้อมูลที่อ่านได้</div>`;
    document.getElementById('importConfirmBtn').disabled = true;
    return;
  }
  preview.innerHTML = `
    <div style="margin-bottom:.5rem;font-size:12px;font-weight:700;">พบ ${parsedImportRows.length} รายการ</div>
    <div style="max-height:200px;overflow-y:auto;background:var(--bg);border-radius:8px;padding:8px;">
      ${parsedImportRows.map((r, i) => `
        <div class="import-dis-row">
          <span class="import-dis-num">${i+1}.</span>
          <div style="flex:1;min-width:0;">
            ${r.assetNo ? `<div class="import-dis-ref">${r.assetNo}</div>` : '<div style="font-size:11px;color:var(--tx3)">(ไม่มีรหัส)</div>'}
            ${r.serial  ? `<div class="import-dis-sn">S/N: ${r.serial}</div>` : ''}
            ${r.dateRaw ? `<div style="font-size:10px;color:var(--tx3)">📅 ${r.dateRaw}</div>` : ''}
          </div>
          <span style="font-size:10px;color:var(--g)">✓</span>
        </div>`).join('')}
    </div>`;
  const btn = document.getElementById('importConfirmBtn');
  btn.disabled = false;
  btn.textContent = `✅ นำเข้า ${parsedImportRows.length} รายการ`;
}

function parseImportText(raw) {
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const results = [];
  lines.forEach(line => {
    let cleaned = line.replace(/^\d+[\.\)]\s*/, '').trim();
    const snMatch = cleaned.match(/S\/N\s*[:：]\s*([A-Z0-9]+)/i);
    const serial = snMatch ? snMatch[1].trim() : '';
    let assetPart = cleaned.replace(/S\/N\s*[:：]\s*[A-Z0-9]+/i, '').trim().replace(/[\s\-\/]+$/, '').replace(/^[\s\-\/]+/, '').trim();
    const assetNo = assetPart.match(/[A-Z0-9]{2,}/i) ? assetPart : '';
    if (serial || assetNo) results.push({ assetNo, serial, name: assetNo || serial, dateRaw: '', _fromText: true });
  });
  return results;
}

async function doImport() {
  if (!parsedImportRows.length) return;
  const defCategory = document.getElementById('importCategory')?.value || '';
  const defReason   = document.getElementById('importReason').value;
  const defStatus   = document.getElementById('importStatus').value;
  const btn = document.getElementById('importConfirmBtn');
  btn.disabled = true; btn.textContent = 'กำลังนำเข้า...';
  try {
    const batch = db.batch();
    parsedImportRows.forEach(r => {
      const ref = db.collection('disposed').doc();
      let disposedAt;
      if (r.dateRaw) {
        let d = null;
        if (/^\d{4}-\d{2}-\d{2}$/.test(r.dateRaw)) d = new Date(r.dateRaw + 'T00:00:00');
        else if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(r.dateRaw)) { const [dd,mm,yyyy] = r.dateRaw.split('/'); d = new Date(`${yyyy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}T00:00:00`); }
        disposedAt = d && !isNaN(d) ? firebase.firestore.Timestamp.fromDate(d) : firebase.firestore.FieldValue.serverTimestamp();
      } else {
        disposedAt = firebase.firestore.FieldValue.serverTimestamp();
      }
      batch.set(ref, {
        assetNo:  r.assetNo || '', serial:  r.serial || '',
        name:     r.name || r.assetNo || '', docNo: r.docNo || '',
        category: r.category || defCategory,
        reason:   r.reason || defReason, status: r.status || defStatus,
        remark:   r.remark || '', images: [], sold: r.sold || false,
        disposedAt,
        createdBy: currentUser.displayName || currentUser.email,
        createdByUid: currentUser.uid,
      });
    });
    await batch.commit();
    showNotif(`นำเข้าสำเร็จ ${parsedImportRows.length} รายการ`);
    closeModal();
    await loadDisposed();
  } catch (e) {
    showNotif('นำเข้าไม่สำเร็จ: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'ลองใหม่';
  }
}

function handleImgDrop(e) {

function handleFileSelect(input) {

async function uploadToImgBB(file) {
  if (!IMGBB_KEY || IMGBB_KEY === 'YOUR_IMGBB_API_KEY') { showNotif('กรุณาตั้งค่า ImgBB API Key', 'error'); return; }
  if (file.size > 10 * 1024 * 1024) { showNotif('ไฟล์ใหญ่เกิน 10MB', 'error'); return; }
  const pid = 'p' + Date.now() + Math.random().toString(36).slice(2);
  const preview = document.getElementById('imgPreview');
  if (preview) preview.insertAdjacentHTML('beforeend', `<div class="img-preview-thumb img-uploading" id="thumb_${pid}"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx3)">⏳</div></div>`);
  const statusEl = document.getElementById('uploadStatus');
  if (statusEl) statusEl.textContent = 'กำลังอัปโหลด...';
  try {
    const formData = new FormData(); formData.append('image', file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: formData });
    const data = await res.json();
    if (!data.success) throw new Error(data.error?.message || 'Upload failed');
    const url = data.data.url;
    uploadedUrls.push(url);
    const thumb = document.getElementById(`thumb_${pid}`);
    if (thumb) { thumb.classList.remove('img-uploading'); thumb.innerHTML = `<img src="${url}" alt=""/><button class="img-preview-del" onclick="removeImg('${url}',this.closest('.img-preview-thumb'))">✕</button>`; }
    if (statusEl) statusEl.textContent = `อัปโหลดสำเร็จ ${uploadedUrls.length} รูป`;
  } catch (e) {
    const thumb = document.getElementById(`thumb_${pid}`); if (thumb) thumb.remove();
    showNotif('อัปโหลดไม่สำเร็จ: ' + e.message, 'error');
    if (statusEl) statusEl.textContent = '';
  }
}
function removeImg(url, el) { uploadedUrls = uploadedUrls.filter(u => u !== url); if (el) el.remove(); }

    remark:     document.getElementById('eRemark').value.trim(),
    disposedAt: inputValToFirestore(dateVal),
    updatedAt:  firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy:  currentUser.displayName || currentUser.email,
  };
  try {
    await db.collection('disposed').doc(docId).update(updates);
    const d = allDisposed.find(x => x.docId === docId);
    if (d) Object.assign(d, updates);
    showNotif('บันทึกสำเร็จ');
    closeModal();
    renderList();
  } catch (e) { showNotif('บันทึกไม่สำเร็จ: ' + e.message, 'error'); }
}

// ─── Delete ────────────────────────────────────────────────
async function deleteDispose(docId) {
  const d = allDisposed.find(x => x.docId === docId);
  if (!d) return;
  if (!confirm(`ลบรายการ "${d.name || d.assetNo}" ออกจากระบบ?\nไม่สามารถย้อนกลับได้`)) return;
  try {
    await db.collection('disposed').doc(docId).delete();
    allDisposed = allDisposed.filter(x => x.docId !== docId);
    showNotif('ลบสำเร็จ');
    closeModal();
    renderPage();
  } catch (e) { showNotif('ลบไม่สำเร็จ: ' + e.message, 'error'); }
}

// ─── Lightbox ──────────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Update cat preview when name typed
document.addEventListener('input', e => { if (e.target.id === 'ncName' || e.target.id === 'ecName') updateCatPreview(); });

if (typeof NAV_ITEMS !== 'undefined' && !NAV_ITEMS.find(n => n.id === 'dispose')) {
  const histIdx = NAV_ITEMS.findIndex(n => n.id === 'history');
  NAV_ITEMS.splice(histIdx >= 0 ? histIdx + 1 : NAV_ITEMS.length, 0, { id:'dispose', label:'ตัดทรัพย์', icon:'♻️', href:'dispose.html', adminOnly:false });
}
</script>
