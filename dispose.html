<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ตัดทรัพย์สิน — Template</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#1D9E75;--gd:#148A60;--gl:#A7F3D0;--gll:#ECFDF5;
  --r:#EF4444;--am:#F59E0B;
  --bg:#F8FAFC;--surf:#FFFFFF;
  --tx:#111827;--tx2:#374151;--tx3:#9CA3AF;
  --bdr:#E5E7EB;--bdrm:#D1D5DB;
  --font:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace;
  --radius:12px;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;}

/* ── EDITOR PANEL ── */
.editor{max-width:680px;margin:0 auto;padding:16px;}
.editor-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:14px 16px;background:var(--surf);border-radius:var(--radius);border:1px solid var(--bdr);}
.editor-logo{width:38px;height:38px;background:var(--g);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.editor-title{font-size:16px;font-weight:700;}
.editor-sub{font-size:12px;color:var(--tx3);margin-top:1px;}

.doc-meta{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.field-input{width:100%;border:1.5px solid var(--bdrm);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--font);color:var(--tx);background:var(--bg);transition:.15s;outline:none;}
.field-input:focus{border-color:var(--g);background:#fff;box-shadow:0 0 0 3px var(--gll);}

/* ── ITEM CARD (editor) ── */
.items-section{margin-bottom:14px;}
.section-label{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.item-card{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--radius);padding:14px;margin-bottom:10px;position:relative;transition:.15s;}
.item-card:hover{border-color:var(--bdrm);}
.item-num{width:26px;height:26px;background:var(--g);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.item-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.item-header-title{font-size:13px;font-weight:700;flex:1;}
.item-del{background:none;border:1px solid #FECACA;color:#EF4444;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:var(--font);}
.item-del:hover{background:#FEF2F2;}
.item-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}

/* ── IMAGE UPLOAD ── */
.img-upload-zone{border:2px dashed var(--bdrm);border-radius:9px;padding:10px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg);}
.img-upload-zone:hover,.img-upload-zone.drag{border-color:var(--g);background:var(--gll);}
.img-upload-zone .uz-icon{font-size:22px;margin-bottom:3px;}
.img-upload-zone .uz-text{font-size:11px;color:var(--tx3);}
.img-thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.img-thumb{position:relative;width:68px;height:68px;border-radius:8px;overflow:hidden;border:1px solid var(--bdrm);}
.img-thumb img{width:100%;height:100%;object-fit:cover;}
.img-thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.img-uploading{opacity:.5;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;border:1.5px solid var(--bdrm);background:var(--surf);color:var(--tx2);cursor:pointer;transition:all .15s;font-family:var(--font);}
.btn:hover{border-color:var(--g);color:var(--g);}
.btn-primary{background:var(--g);color:#fff;border-color:var(--g);}
.btn-primary:hover{background:var(--gd);border-color:var(--gd);}
.btn-ghost{background:transparent;border-color:var(--bdrm);color:var(--tx3);}
.btn-ghost:hover{border-color:var(--bdrm);color:var(--tx2);background:var(--bg);}

.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.add-item-btn{width:100%;padding:10px;border:2px dashed var(--bdrm);border-radius:10px;background:none;font-size:13px;font-weight:700;color:var(--tx3);cursor:pointer;font-family:var(--font);transition:.15s;}
.add-item-btn:hover{border-color:var(--g);color:var(--g);background:var(--gll);}

/* imgbb status */
.upload-status{font-size:11px;color:var(--tx3);margin-top:4px;min-height:14px;}

/* ── PRINT PREVIEW AREA ── */
#printArea{display:none;}

/* ── PRINT STYLES ── */
@media print{
  .editor{display:none!important;}
  #printArea{display:block!important;}
  body{background:#fff;}
  @page{size:A4;margin:15mm 18mm;}
}

/* ── PRINT TEMPLATE ── */
#printArea{
  font-family:'Sarabun',sans-serif;
  font-size:13pt;
  color:#111;
  line-height:1.5;
  padding:20px;
}
.print-doc-header{text-align:center;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #111;}
.print-doc-title{font-size:18pt;font-weight:700;margin-bottom:4px;}
.print-doc-meta{font-size:11pt;color:#444;display:flex;justify-content:center;gap:24px;}
.print-doc-meta span{display:inline-flex;align-items:center;gap:4px;}

.print-item{margin-bottom:24px;page-break-inside:avoid;}
.print-item-header{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
.print-item-num{font-size:13pt;font-weight:700;color:#111;}
.print-item-ref{font-size:13pt;font-weight:700;color:#111;font-family:'IBM Plex Mono',monospace;text-decoration:underline;text-underline-offset:3px;}
.print-item-sn{font-size:12pt;color:#111;font-family:'IBM Plex Mono',monospace;}
.print-item-name{font-size:11pt;color:#444;margin-bottom:8px;margin-left:22px;}
.print-item-sep{font-size:13pt;font-weight:400;color:#666;margin:0 4px;}

.print-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-left:22px;}
.print-img-wrap{border:1px solid #ccc;border-radius:6px;overflow:hidden;aspect-ratio:4/3;}
.print-img-wrap img{width:100%;height:100%;object-fit:cover;}

.print-footer{margin-top:28px;padding-top:10px;border-top:1px solid #ccc;font-size:10pt;color:#777;display:flex;justify-content:space-between;}

/* ── PREVIEW MODAL ── */
.preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;overflow-y:auto;padding:20px;}
.preview-overlay.open{display:block;}
.preview-box{background:#fff;max-width:760px;margin:0 auto;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.preview-toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surf);border-bottom:1px solid var(--bdr);}
.preview-toolbar-title{font-size:13px;font-weight:700;}
.preview-content{padding:24px;font-family:'Sarabun',sans-serif;font-size:13pt;color:#111;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── responsive ── */
@media(max-width:520px){
  .meta-grid,.item-fields{grid-template-columns:1fr;}
  .action-bar{flex-direction:column;}
  .action-bar .btn{width:100%;justify-content:center;}
}
</style>
</head>
<body>

<!-- ══════════ EDITOR ══════════ -->
<div class="editor">

  <div class="editor-header">
    <div class="editor-logo">📦</div>
    <div>
      <div class="editor-title">สร้างเอกสารตัดทรัพย์สิน</div>
      <div class="editor-sub">เพิ่มรายการ + อัพโหลดรูป → พิมพ์หรือส่งออก</div>
    </div>
  </div>

  <!-- Doc-level meta -->
  <div class="doc-meta">
    <div class="field-label" style="margin-bottom:10px;">📄 ข้อมูลเอกสาร</div>
    <div class="meta-grid">
      <div>
        <div class="field-label">ชื่อเอกสาร / หัวข้อ</div>
        <input class="field-input" id="docTitle" placeholder="เช่น รายการตัดทรัพย์สิน ประจำปี 2568" value="รายการตัดทรัพย์สิน"/>
      </div>
      <div>
        <div class="field-label">เลขที่เอกสาร</div>
        <input class="field-input" id="docRef" placeholder="เช่น FNITD-25-000147"/>
      </div>
      <div>
        <div class="field-label">แผนก / หน่วยงาน</div>
        <input class="field-input" id="docDept" placeholder="เช่น IT Department"/>
      </div>
      <div>
        <div class="field-label">วันที่</div>
        <input class="field-input" type="date" id="docDate" value=""/>
      </div>
    </div>
  </div>

  <!-- Items -->
  <div class="items-section">
    <div class="section-label">🗂️ รายการทรัพย์สิน</div>
    <div id="itemsContainer"></div>
    <button class="add-item-btn" onclick="addItem()">+ เพิ่มรายการ</button>
  </div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn btn-primary" onclick="openPreview()">👁 ดูตัวอย่าง</button>
    <button class="btn" onclick="doPrint()">🖨️ พิมพ์</button>
    <button class="btn btn-ghost" onclick="clearAll()">🗑️ ล้างทั้งหมด</button>
  </div>

  <div style="font-size:11px;color:var(--tx3);text-align:center;padding-bottom:20px;">
    รูปภาพจะถูกฝังลงในเอกสารเมื่อพิมพ์ · รองรับ JPG / PNG · อัพโหลดผ่าน ImgBB
  </div>
</div>

<!-- ══════════ PRINT AREA ══════════ -->
<div id="printArea"></div>

<!-- ══════════ PREVIEW MODAL ══════════ -->
<div class="preview-overlay" id="previewOverlay" onclick="closePreviewOutside(event)">
  <div class="preview-box">
    <div class="preview-toolbar">
      <div class="preview-toolbar-title">👁 ตัวอย่างเอกสาร</div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-primary" style="padding:6px 14px;font-size:12px;" onclick="doPrint()">🖨️ พิมพ์</button>
        <button class="btn btn-ghost" style="padding:6px 14px;font-size:12px;" onclick="closePreview()">✕ ปิด</button>
      </div>
    </div>
    <div class="preview-content" id="previewContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const IMGBB_KEY = '4aecea8adeacd9e1dc7815e351021b99';

// Set default date to today
document.getElementById('docDate').value = new Date().toISOString().split('T')[0];

let items = [];   // [{id, assetNo, serial, name, remark, images:[{url,thumb}]}]

// ── Init with one empty item ──
addItem();

function addItem(){
  const id = 'item_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  items.push({ id, assetNo:'', serial:'', name:'', remark:'', images:[] });
  renderItems();
  // focus on the new item's assetNo
  setTimeout(()=>{ const el=document.getElementById('f_assetNo_'+id); if(el) el.focus(); },100);
}

function removeItem(id){
  if(items.length === 1){ showToast('ต้องมีอย่างน้อย 1 รายการ'); return; }
  items = items.filter(x=>x.id!==id);
  renderItems();
}

function renderItems(){
  const container = document.getElementById('itemsContainer');
  container.innerHTML = items.map((item,idx)=>`
    <div class="item-card" id="card_${item.id}">
      <div class="item-header">
        <div class="item-num">${idx+1}</div>
        <div class="item-header-title" style="font-size:12px;color:var(--tx3);">รายการที่ ${idx+1}</div>
        <button class="item-del" onclick="removeItem('${item.id}')">✕ ลบ</button>
      </div>

      <div class="item-fields">
        <div>
          <div class="field-label">รหัสทรัพย์สิน / เลขที่เอกสาร</div>
          <input class="field-input" id="f_assetNo_${item.id}"
            placeholder="เช่น FNITD-25-000147 หรือ OF20-0494"
            value="${escHtml(item.assetNo)}"
            oninput="updateField('${item.id}','assetNo',this.value)"/>
        </div>
        <div>
          <div class="field-label">Serial Number (S/N)</div>
          <input class="field-input" id="f_serial_${item.id}"
            placeholder="เช่น SGH343QLLS"
            value="${escHtml(item.serial)}"
            oninput="updateField('${item.id}','serial',this.value)"/>
        </div>
      </div>
      <div style="margin-bottom:10px;">
        <div class="field-label">ชื่อ / รายละเอียดอุปกรณ์ (ไม่บังคับ)</div>
        <input class="field-input" id="f_name_${item.id}"
          placeholder="เช่น HP Compaq 6300 Pro SFF"
          value="${escHtml(item.name)}"
          oninput="updateField('${item.id}','name',this.value)"/>
      </div>

      <!-- Images -->
      <div class="field-label" style="margin-bottom:6px;">📷 รูปภาพอุปกรณ์</div>
      <div class="img-upload-zone" id="zone_${item.id}"
        onclick="document.getElementById('file_${item.id}').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event,'${item.id}')">
        <div class="uz-icon">🖼️</div>
        <div class="uz-text">คลิกหรือลากรูปมาวาง<br><span style="font-size:10px;">JPG / PNG / HEIC ขนาดไม่เกิน 10MB</span></div>
      </div>
      <input type="file" id="file_${item.id}" accept="image/*" multiple style="display:none"
        onchange="handleFiles(this,'${item.id}')"/>
      <div id="thumbs_${item.id}" class="img-thumbs">
        ${renderThumbs(item)}
      </div>
      <div class="upload-status" id="status_${item.id}"></div>
    </div>
  `).join('');
}

function renderThumbs(item){
  return item.images.map((img,i)=>`
    <div class="img-thumb ${img.uploading?'img-uploading':''}">
      <img src="${img.url||img.thumb}" alt="" loading="lazy"/>
      <button class="img-thumb-del" onclick="removeImg('${item.id}',${i})">✕</button>
    </div>
  `).join('');
}

function updateField(id, field, val){
  const item = items.find(x=>x.id===id);
  if(item) item[field] = val;
}

function removeImg(itemId, imgIdx){
  const item = items.find(x=>x.id===itemId);
  if(!item) return;
  item.images.splice(imgIdx,1);
  refreshThumbs(item);
}

function refreshThumbs(item){
  const el = document.getElementById('thumbs_'+item.id);
  if(el) el.innerHTML = renderThumbs(item);
}

// ── File handlers ──
function handleDrop(e, id){
  e.preventDefault();
  const zone = document.getElementById('zone_'+id);
  if(zone) zone.classList.remove('drag');
  [...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')).forEach(f=>uploadImg(f,id));
}
function handleFiles(input, id){
  [...input.files].forEach(f=>uploadImg(f,id)); input.value='';
}

async function uploadImg(file, itemId){
  const item = items.find(x=>x.id===itemId);
  if(!item) return;
  if(file.size > 10*1024*1024){ showToast('ไฟล์ใหญ่เกิน 10MB'); return; }

  // Create local preview immediately
  const localUrl = URL.createObjectURL(file);
  const imgObj = { url: localUrl, uploading: true, final: false };
  item.images.push(imgObj);
  refreshThumbs(item);
  setStatus(itemId, '⏳ กำลังอัพโหลด...');

  try {
    const fd = new FormData(); fd.append('image', file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
    const data = await res.json();
    if(!data.success) throw new Error(data.error?.message || 'Upload failed');
    imgObj.url = data.data.url;
    imgObj.uploading = false;
    imgObj.final = true;
    refreshThumbs(item);
    setStatus(itemId, `✅ อัพโหลดสำเร็จ (${item.images.filter(x=>x.final).length} รูป)`);
    showToast('อัพโหลดสำเร็จ');
  } catch(e){
    // keep local preview if upload fails
    imgObj.uploading = false;
    imgObj.uploadFailed = true;
    refreshThumbs(item);
    setStatus(itemId, '⚠️ อัพโหลดไม่สำเร็จ — ใช้รูปชั่วคราว (ไม่บันทึกถาวร)');
    showToast('อัพโหลดไม่สำเร็จ: ' + e.message);
  }
}

function setStatus(itemId, msg){
  const el = document.getElementById('status_'+itemId);
  if(el) el.textContent = msg;
}

// ── Build doc HTML (shared by preview & print) ──
function buildDocHTML(forPrint=false){
  const title  = document.getElementById('docTitle').value.trim() || 'รายการตัดทรัพย์สิน';
  const ref    = document.getElementById('docRef').value.trim();
  const dept   = document.getElementById('docDept').value.trim();
  const dateV  = document.getElementById('docDate').value;
  const dateStr = dateV ? new Date(dateV+'T12:00:00').toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'}) : '';

  const itemsHTML = items.filter(it => it.assetNo || it.serial || it.name).map((item,idx)=>{
    const hasAssetNo = !!item.assetNo.trim();
    const hasSerial  = !!item.serial.trim();
    const hasName    = !!item.name.trim();

    // Header line matching the template: "1. FNITD-25-000147    S/N; SGH343QLLS"
    let headerLine = `<span class="print-item-num">${idx+1}.</span> `;
    if(hasAssetNo) headerLine += `<span class="print-item-ref">${escHtml(item.assetNo)}</span>`;
    if(hasAssetNo && hasSerial) headerLine += `<span class="print-item-sep">&nbsp;&nbsp;&nbsp;</span>`;
    if(hasSerial) headerLine += `<span class="print-item-sn">S/N; ${escHtml(item.serial)}</span>`;
    if(!hasAssetNo && !hasSerial && hasName) headerLine += `<span class="print-item-ref">${escHtml(item.name)}</span>`;

    const nameRow = (hasName && (hasAssetNo || hasSerial))
      ? `<div class="print-item-name">${escHtml(item.name)}</div>` : '';

    const imgsHTML = item.images.length
      ? `<div class="print-imgs">${item.images.map(img=>`
          <div class="print-img-wrap">
            <img src="${img.url}" alt="" style="width:100%;height:100%;object-fit:cover;"/>
          </div>`).join('')}</div>`
      : `<div style="margin-left:22px;font-size:10pt;color:#aaa;padding:8px 0;">(ไม่มีรูปภาพ)</div>`;

    return `<div class="print-item">
      <div class="print-item-header">${headerLine}</div>
      ${nameRow}
      ${imgsHTML}
    </div>`;
  }).join('');

  const footerHTML = `
    <div class="print-footer">
      <span>จำนวน ${items.filter(it=>it.assetNo||it.serial||it.name).length} รายการ</span>
      <span>พิมพ์เมื่อ: ${new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})}</span>
    </div>`;

  const metaLine = [dept && `🏢 ${dept}`, ref && `📄 ${ref}`, dateStr && `📅 ${dateStr}`].filter(Boolean).join(' &nbsp;·&nbsp; ');

  return `
    <div class="print-doc-header">
      <div class="print-doc-title">${escHtml(title)}</div>
      ${metaLine ? `<div class="print-doc-meta" style="margin-top:6px;font-size:11pt;color:#555;">${metaLine}</div>` : ''}
    </div>
    ${itemsHTML || '<div style="text-align:center;color:#aaa;padding:20px;">ยังไม่มีรายการ</div>'}
    ${footerHTML}
  `;
}

// ── Preview ──
function openPreview(){
  document.getElementById('previewContent').innerHTML = buildDocHTML(false);
  document.getElementById('previewOverlay').classList.add('open');
}
function closePreview(){ document.getElementById('previewOverlay').classList.remove('open'); }
function closePreviewOutside(e){ if(e.target===document.getElementById('previewOverlay')) closePreview(); }

// ── Print ──
function doPrint(){
  const html = buildDocHTML(true);
  document.getElementById('printArea').innerHTML = html;
  setTimeout(()=>{ window.print(); },150);
}

// ── Clear all ──
function clearAll(){
  if(!confirm('ล้างข้อมูลทั้งหมด?')) return;
  items = [];
  addItem();
  document.getElementById('docTitle').value='รายการตัดทรัพย์สิน';
  document.getElementById('docRef').value='';
  document.getElementById('docDept').value='';
  document.getElementById('docDate').value=new Date().toISOString().split('T')[0];
  showToast('ล้างข้อมูลแล้ว');
}

// ── Utils ──
function escHtml(str){
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg,dur=2200){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
