<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>RYG Stock — เข้าสู่ระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun','Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#0a5c45,#1D9E75 55%,#64d4aa);}
.login-card{background:#fff;border-radius:20px;padding:2.2rem;width:340px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,.18);}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:1.8rem;}
.logo-box{width:44px;height:44px;background:#1D9E75;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.login-card h1{font-size:18px;font-weight:700;}
.login-card p{font-size:12px;color:#999;}
.btn-google{width:100%;padding:11px;border:1.5px solid rgba(0,0,0,.15);border-radius:10px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;font-weight:600;color:#111;font-family:'Sarabun',sans-serif;transition:background .15s;}
.btn-google:hover{background:#f5f5f5;}
.login-note{font-size:11px;color:#999;text-align:center;margin-top:.9rem;line-height:1.6;}
#errMsg{color:#C0392B;font-size:12px;text-align:center;margin-top:.7rem;display:none;}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="logo-box">📦</div>
    <div><h1>RYG Stock</h1><p>ระบบจัดการ Spare Part</p></div>
  </div>
  <button class="btn-google" onclick="signInGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    เข้าสู่ระบบด้วย Google
  </button>
  <div id="errMsg"></div>
  <div class="login-note">ระบบตรวจสอบสิทธิ์จาก Firestore<br>ต้องได้รับการอนุมัติจากผู้ดูแลระบบ</div>
</div>
<script>
const FC={apiKey:"AIzaSyABKbRCDNh5SHwvbuFtAudLnRYepZfXk7s",authDomain:"ryg-stock.firebaseapp.com",projectId:"ryg-stock",storageBucket:"ryg-stock.firebasestorage.app",messagingSenderId:"338213551131",appId:"1:338213551131:web:153773df4f8111b2364cbe"};
firebase.initializeApp(FC);
const auth=firebase.auth();
auth.onAuthStateChanged(u=>{ if(u) window.location.href='index.html'; });
function signInGoogle(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>{
    const el=document.getElementById('errMsg');el.textContent=e.message;el.style.display='block';
  });
}
</script>
</body>
</html>
