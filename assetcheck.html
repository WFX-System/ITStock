<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>RYG Stock — ตรวจเช็คทรัพย์สิน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:1rem;}
.search-box{flex:1;min-width:180px;max-width:300px;padding:8px 12px;border:1.5px solid var(--bdrm);
  border-radius:var(--rad);font-size:13px;background:var(--surf);color:var(--tx1);}
.search-box:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px var(--gll);}

.comp-group{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radlg);margin-bottom:1rem;overflow:hidden;}
.comp-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:.75rem 1rem;
  background:linear-gradient(135deg,var(--gll) 0%,var(--surf) 100%);border-bottom:1px solid var(--bdr);
  cursor:pointer;user-select:none;}
.comp-header:hover{filter:brightness(.97);}
.comp-name{font-size:14px;font-weight:700;}
.comp-meta{font-size:11px;color:var(--tx3);}
.comp-ip{font-size:11px;color:var(--tx3);font-family:var(--mono);}
.prog-wrap{width:80px;height:6px;background:var(--bdr);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--g);border-radius:3px;transition:width .3s;}
.prog-lbl{font-size:10px;font-weight:700;color:var(--tx3);white-space:nowrap;}

.asset-table{width:100%;border-collapse:collapse;}
.asset-table th{padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.04em;color:var(--tx3);background:var(--bg);border-bottom:1px solid var(--bdr);
  text-align:left;white-space:nowrap;}
.asset-row{border-bottom:1px solid var(--bdr);transition:background .15s;}
.asset-row.row-ok{background:#F0FFF8;}
.asset-row.row-issue{background:#FFF5F0;}
.asset-row td{padding:8px 10px;vertical-align:top;font-size:12px;}
.code-badge{font-family:var(--mono);font-size:10px;background:var(--bg);border:1px solid var(--bdr);
  border-radius:4px;padding:2px 6px;display:inline-block;white-space:nowrap;}
.badge-new{font-size:9px;font-weight:800;letter-spacing:.03em;color:#fff;background:#2563EB;
  border-radius:20px;padding:1px 7px;display:inline-block;margin-left:6px;vertical-align:middle;
  animation:badgeNewPulse 1.6s ease-in-out infinite;}
@keyframes badgeNewPulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.sn-text{font-family:var(--mono);font-size:11px;color:var(--tx2);}

/* issue summary pill — แสดงข้อมูลที่บันทึกแล้วโดยไม่ต้องกาง panel */
.issue-summary{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.issue-pill{font-size:10px;font-family:var(--mono);background:#FEE2E2;color:#991B1B;
  border:1px solid #FCA5A5;border-radius:4px;padding:1px 6px;max-width:180px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.issue-input{width:100%;padding:5px 8px;border:1.5px solid var(--bdrm);border-radius:var(--radsm);
  font-size:11px;font-family:var(--mono);background:var(--surf);color:var(--tx1);
  transition:border-color .15s;box-sizing:border-box;}
.issue-input:focus{outline:none;border-color:var(--am);box-shadow:0 0 0 2px var(--aml);}
.issue-input.has-val{border-color:var(--r);background:#FFF5F0;}
.issue-input.dirty{border-color:var(--am)!important;background:#FFFBEB!important;}

.btn-chk{padding:5px 10px;border-radius:var(--radsm);font-size:11px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--bdrm);background:var(--surf);
  transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.btn-chk:hover{background:var(--gll);border-color:var(--g);color:var(--g);}
.btn-chk.active{background:var(--g);border-color:var(--g);color:#fff;}

.btn-issue{padding:5px 10px;border-radius:var(--radsm);font-size:11px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--bdrm);background:var(--surf);
  transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.btn-issue:hover{background:#FFF0EC;border-color:var(--r);color:var(--r);}
.btn-issue.active{background:var(--r);border-color:var(--r);color:#fff;}

.btn-reg{padding:4px 8px;border-radius:var(--radsm);font-size:10px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--bdrm);background:var(--surf);
  transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;}
.btn-reg:hover{background:var(--aml);border-color:var(--am);color:var(--am);}
.btn-reg.active{background:var(--am);border-color:var(--am);color:#fff;}

/* ── ปุ่มลบเครื่อง (header) ── */
.btn-del-comp{width:28px;height:28px;border-radius:var(--radsm);font-size:13px;
  cursor:pointer;border:1.5px solid var(--bdrm);background:var(--surf);color:var(--tx3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.btn-del-comp:hover{background:#FEE2E2;border-color:var(--r);color:var(--r);}

/* ── ปุ่มลบรายการ (แถวอุปกรณ์) ── */
.btn-del-item{padding:4px 8px;border-radius:var(--radsm);font-size:10px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--bdrm);background:var(--surf);color:var(--tx3);
  transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;}
.btn-del-item:hover{background:#FEE2E2;border-color:var(--r);color:var(--r);}

/* issue panel — ซ่อนเสมอ เปิดเมื่อกดปุ่มเท่านั้น */
.issue-panel-row{display:none;}
.issue-panel-row.open{display:table-row;}
.issue-panel-row td{padding:0;}
.issue-panel-inner{background:#FFF5F0;border-top:1px solid #FFCDB8;padding:10px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.issue-panel-inner label{font-size:10px;color:var(--r);font-weight:700;display:block;margin-bottom:3px;}

/* Save button */
.btn-save-issue{
  grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:7px 14px;border-radius:var(--radsm);font-size:12px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--g);background:var(--g);color:#fff;
  transition:all .2s;width:100%;box-sizing:border-box;}
.btn-save-issue:hover{filter:brightness(1.08);}
.btn-save-issue.dirty{background:var(--am);border-color:var(--am);color:#fff;}
.btn-save-issue.saving{background:var(--aml);border-color:var(--am);color:var(--am);cursor:default;}
.btn-save-issue.saved{background:#D1FAE5;border-color:#6EE7B7;color:#065F46;cursor:default;}
.btn-save-issue:disabled{opacity:.6;cursor:not-allowed;}

.check-date{font-size:10px;color:var(--tx3);margin-top:3px;}
.summary-bar{display:flex;gap:16px;flex-wrap:wrap;padding:.8rem 1.2rem;
  background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radlg);margin-bottom:1rem;}
.sum-item{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px;}
.sum-num{font-size:22px;font-weight:700;line-height:1;}
.sum-lbl{font-size:10px;color:var(--tx3);font-weight:600;text-align:center;}

.import-zone{border:2px dashed var(--bdrm);border-radius:var(--radlg);padding:2.5rem;
  text-align:center;background:var(--bg);transition:all .2s;cursor:pointer;margin-bottom:1rem;}
.import-zone.drag-over{border-color:var(--g);background:var(--gll);}
.import-zone-icon{font-size:36px;margin-bottom:.6rem;}
.import-zone p{font-size:13px;color:var(--tx3);line-height:1.8;}

.comp-body{display:none;}
.comp-body.expanded{display:block;}

.comp-status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.comp-status-ok{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;}
.comp-status-issue{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;}
.comp-status-partial{background:#FEF9C3;color:#78350F;border:1px solid #FDE68A;}
.comp-status-pending{background:#F3F4F6;color:#6B7280;border:1px solid #D1D5DB;}
mark{background:#FFF176;border-radius:2px;padding:0 1px;}
.empty-pg{text-align:center;padding:4rem 2rem;color:var(--tx3);}
.empty-pg .icon{font-size:48px;margin-bottom:1rem;}
</style>
</head>
<body>
<div id="loadingScreen">
  <div style="width:52px;height:52px;background:#1D9E75;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;">📦</div>
  <div style="font-size:15px;font-weight:700;">RYG Stock System</div>
  <div class="spinner"></div>
</div>

<div id="mainApp">
  <div class="topbar">
    <div class="topbar-logo">📦</div>
    <span class="topbar-title">RYG Stock</span>
    <div class="user-mini">
      <img id="uAvatar" class="user-ava" src="" onerror="this.style.display='none'" alt=""/>
      <span id="uFallback" class="user-ava"></span>
      <span id="uName" class="user-name-top"></span>
      <span id="uRole" class="badge-role badge-admin"></span>
      <button class="btn-topout" onclick="doLogout()">ออก</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>

  <div class="content">

    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1rem;">
      <div>
        <div style="font-size:16px;font-weight:700;">🔍 ตรวจเช็คทรัพย์สิน</div>
        <div id="pageSubtitle" style="font-size:12px;color:var(--tx3);margin-top:2px;">กรุณา Import ไฟล์รายการทรัพย์สินก่อน</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <button class="btn btn-sm" onclick="downloadTemplate()">📥 ตัวอย่าง</button>
        <label class="btn btn-sm btn-primary" style="cursor:pointer;">
          📂 Import Excel
          <input type="file" id="importFile" accept=".xls,.xlsx" style="display:none" onchange="handleImport(this)"/>
        </label>
        <button class="btn btn-sm btn-danger" id="btnClearAll" onclick="confirmClearAll()" style="display:none;">
          🗑️ ลบทั้งหมด
        </button>
      </div>
    </div>

    <div class="summary-bar" id="summaryBar" style="display:none">
      <div class="sum-item"><div class="sum-num" id="sumComp" style="color:var(--tx2)">0</div><div class="sum-lbl">เครื่อง</div></div>
      <div class="sum-item"><div class="sum-num" id="sumTotal" style="color:var(--tx2)">0</div><div class="sum-lbl">รายการทั้งหมด</div></div>
      <div class="sum-item"><div class="sum-num" id="sumChecked" style="color:var(--g)">0</div><div class="sum-lbl">เช็คแล้ว</div></div>
      <div class="sum-item"><div class="sum-num" id="sumIssue" style="color:var(--r)">0</div><div class="sum-lbl">พบปัญหา</div></div>
      <div class="sum-item"><div class="sum-num" id="sumReg" style="color:var(--am)">0</div><div class="sum-lbl">แก้ในทะเบียนแล้ว</div></div>
    </div>

    <div class="toolbar" id="toolbarRow" style="display:none">
      <input class="search-box" type="text" id="searchInput"
        placeholder="🔎 ค้นหาชื่อเครื่อง / Asset Code / รุ่น / SN..."
        oninput="renderAll()"/>
      <select id="filterSel" class="btn btn-sm" style="padding:6px 10px;font-size:12px;width:auto;cursor:pointer;" onchange="renderAll()">
        <option value="">แสดงทั้งหมด</option>
        <option value="pending">⏳ ยังไม่ได้เช็ค</option>
        <option value="checked">✅ เช็คแล้ว</option>
        <option value="issue">⚠️ พบปัญหา</option>
      </select>
      <select id="sortSel" class="btn btn-sm" style="padding:6px 10px;font-size:12px;width:auto;cursor:pointer;" onchange="renderAll()">
        <option value="name">🔤 เรียงตามชื่อเครื่อง</option>
        <option value="progress_asc">📈 ยังไม่เช็ค → เสร็จ</option>
        <option value="progress_desc">📉 เสร็จ → ยังไม่เช็ค</option>
        <option value="issue">⚠️ พบปัญหาก่อน</option>
      </select>
      <button class="btn btn-sm" onclick="expandAll()">📂 ขยายทั้งหมด</button>
      <button class="btn btn-sm" onclick="collapseAll()">📁 ย่อทั้งหมด</button>
    </div>

    <div class="import-zone" id="importZone"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="handleDrop(event)"
      onclick="document.getElementById('importFile').click()">
      <div class="import-zone-icon">📊</div>
      <p><strong>คลิกหรือลากไฟล์ Excel มาวางที่นี่</strong><br>
      รองรับ .xls และ .xlsx<br>
      <span style="font-size:11px;color:#bbb;">โครงสร้าง: Computer name | อุปกรณ์ | ยี่ห้อ | Asset Code | รุ่น | SN</span></p>
    </div>

    <div id="assetList"></div>

  </div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>
<div id="notif"></div>

<script>
let currentUser=null, currentRole='user', db=null;
let checkData={}, checkState={};

initShell('assetcheck', async(user,role,firestore)=>{
  currentUser=user; currentRole=role; db=firestore;
  startRealtimeSync();
});

function _sessionRef(){ return db.collection('assetSessions').doc('shared'); }

let _saveTimer=null, _isSaving=false;
function saveStorage(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    _isSaving=true;
    try{
      await _sessionRef().set({
        checkData:  JSON.stringify(checkData),
        checkState: JSON.stringify(checkState),
        updatedAt:  firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy:  currentUser?.uid||'',
        updatedByName: currentUser?.displayName||currentUser?.email||'',
      },{merge:true});
    }catch(e){ console.warn('Firestore save error:',e); }
    finally{ setTimeout(()=>{ _isSaving=false; },2000); }
  },600);
}

let _unsubscribe=null;
function startRealtimeSync(){
  if(_unsubscribe) _unsubscribe();
  _unsubscribe=_sessionRef().onSnapshot(snap=>{
    if(_isSaving) return;
    if(snap.exists){
      const d=snap.data();
      try{
        if(d.checkData)  checkData=JSON.parse(d.checkData);
        if(d.checkState) checkState=JSON.parse(d.checkState);
      }catch(e){}
    } else { checkData={}; checkState={}; }
    _ckIndex={}; _ckIndexRev={};
    renderAll();
    if(snap.exists && snap.data().updatedByName && snap.data().updatedBy!==currentUser?.uid)
      showNotif(`🔄 ${snap.data().updatedByName} อัปเดตข้อมูลแล้ว`,'info');
  }, err=>console.warn('Snapshot error:',err));
}

let _ckIndex={}, _ckIndexRev={};
function getCkId(ck){
  if(_ckIndex[ck]===undefined){ const n=Object.keys(_ckIndex).length; _ckIndex[ck]=n; _ckIndexRev[n]=ck; }
  return _ckIndex[ck];
}
function stateKey(ck,idx){ return `${ck}||${idx}`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function highlight(s,q){
  if(!q) return esc(s);
  const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc(s).replace(new RegExp(e,'gi'),m=>`<mark>${m}</mark>`);
}

// ── Import ────────────────────────────────────────
function handleImport(input){ const f=input.files[0]; if(!f)return; input.value=''; readExcelFile(f); }
function handleDrop(e){
  e.preventDefault(); document.getElementById('importZone').classList.remove('drag-over');
  const f=e.dataTransfer.files[0]; if(f) readExcelFile(f);
}
function readExcelFile(file){
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      let wb;
      const data=ev.target.result;
      try{ wb=XLSX.read(data,{type:'binary'}); }
      catch(err){
        const text=new TextDecoder('utf-8',{fatal:false}).decode(new Uint8Array(new Uint8Array(data.length).map((_,i)=>data.charCodeAt(i))));
        wb=XLSX.read(text,{type:'string'});
      }
      const parsed=parseWorkbook(wb);
      const n=Object.keys(parsed).length;
      if(n===0){ showNotif('ไม่พบข้อมูล กรุณาตรวจสอบโครงสร้างไฟล์','error'); return; }

      const sigOf=it=>[it.type,it.brand,it.assetCode,it.model,it.sn,it.regNo].join('||');

      // ── dry-run: หาเครื่องใหม่ และรายการที่เปลี่ยนแปลงในเครื่องเดิม (ยังไม่แก้ข้อมูลจริง) ──
      const newComputerNames=[];
      const updatedComputers=[]; // {ck, addedItems:[{type,assetCode}], addedCount}
      Object.keys(parsed).forEach(ck=>{
        const newComp=parsed[ck];
        const existing=checkData[ck];
        if(!existing){ newComputerNames.push(ck); return; }
        const existingSigs=new Set(existing.items.map(sigOf));
        const addedItems=newComp.items.filter(it=>!existingSigs.has(sigOf(it)));
        if(addedItems.length) updatedComputers.push({ck,addedItems,addedCount:addedItems.length});
      });

      const totalAddedItems=updatedComputers.reduce((s,c)=>s+c.addedCount,0);
      if(newComputerNames.length===0 && updatedComputers.length===0){
        showNotif('Import สำเร็จ ไม่มีข้อมูลใหม่หรือการเปลี่ยนแปลง'); return;
      }

      // ── popup ยืนยันก่อนบันทึกจริง ──
      const lines=[];
      if(newComputerNames.length){
        lines.push(`🆕 เครื่องใหม่ (${newComputerNames.length}):`);
        lines.push(...newComputerNames.slice(0,8).map(ck=>`  • ${ck}`));
        if(newComputerNames.length>8) lines.push(`  ...และอีก ${newComputerNames.length-8} เครื่อง`);
      }
      if(updatedComputers.length){
        if(lines.length) lines.push('');
        lines.push(`✏️ เครื่องเดิมที่มีการเปลี่ยนแปลง (${updatedComputers.length}):`);
        updatedComputers.slice(0,8).forEach(c=>{
          const detail=c.addedItems.slice(0,3).map(it=>`${it.type}${it.assetCode?`(${it.assetCode})`:''}`).join(', ');
          const extra=c.addedItems.length>3?` +${c.addedItems.length-3}`:'';
          lines.push(`  • ${c.ck}: +${c.addedCount} รายการ [${detail}${extra}]`);
        });
        if(updatedComputers.length>8) lines.push(`  ...และอีก ${updatedComputers.length-8} เครื่อง`);
      }
      const msg=`ยืนยัน Import ข้อมูล?\n\n${lines.join('\n')}\n\nรายการที่เปลี่ยนแปลงจะถูกเพิ่มเข้าไปในเครื่องเดิม (ไม่ทับ ไม่ล้างสถานะเช็คที่มีอยู่)`;
      if(!confirm(msg)) return;

      // ── apply จริง ──
      Object.keys(parsed).forEach(ck=>{
        const newComp=parsed[ck];
        const existing=checkData[ck];
        if(!existing){
          newComp.items.forEach(it=>{ it.isNew=true; });   // เครื่องใหม่ทั้งชุด → ทุกรายการติด badge NEW
          checkData[ck]=newComp;
          return;
        }
        const existingSigs=new Set(existing.items.map(sigOf));
        newComp.items.forEach(newItem=>{
          const sig=sigOf(newItem);
          if(!existingSigs.has(sig)){
            newItem.isNew=true;                             // รายการที่เพิ่งถูกเพิ่มเข้าเครื่องเดิม → ติด badge NEW
            existing.items.push(newItem);
            existingSigs.add(sig);
          }
        });
        if(newComp.ip) existing.ip=newComp.ip;
        if(newComp.employee) existing.employee=newComp.employee;
        if(newComp.dept) existing.dept=newComp.dept;
      });

      _ckIndex={}; _ckIndexRev={};
      saveStorage(); renderAll();

      const parts=[];
      if(newComputerNames.length>0) parts.push(`เพิ่มเครื่องใหม่ ${newComputerNames.length} เครื่อง`);
      if(totalAddedItems>0) parts.push(`เพิ่มรายการใหม่ ${totalAddedItems} รายการ ใน ${updatedComputers.length} เครื่องเดิม`);
      showNotif(`Import สำเร็จ: ${parts.join(' · ')}`);
    }catch(err){ showNotif('อ่านไฟล์ไม่สำเร็จ: '+err.message,'error'); }
  };
  reader.readAsBinaryString(file);
}
function parseWorkbook(wb){
  const result={};
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  let currentComp=null, ck=null, inItems=false;
  for(let i=0;i<rows.length;i++){
    const row=rows[i].map(c=>String(c).trim());
    const ci=row.findIndex(c=>c==='Computer name:');
    if(ci!==-1){
      ck=row[ci+1]||`COMP_${i}`; const ip=row[ci+3]||'';
      const nr=(rows[i+1]||[]).map(c=>String(c).trim());
      if(!result[ck]) result[ck]={computerName:ck,ip,employee:nr[1]||'',dept:nr[3]||'',items:[]};
      currentComp=result[ck]; inItems=false; continue;
    }
    if(row.includes('Asset Code')&&(row.includes('Sn')||row.includes('SN'))){ inItems=true; continue; }
    if(currentComp&&inItems){
      const has=row.some(c=>c.length>0); if(!has) continue;
      const t=row[0];
      if(!t||['อุปกรณ์','ประเภท','ยี่ห้อ'].includes(t)) continue;
      if(t==='Asset Code'||t.includes('Asset')) continue;
      const brand=row[1]||'', assetCode=row[2]||'', model=row[4]||row[3]||'', sn=row[5]||row[4]||'', regNo=row[7]||row[6]||'';
      if(assetCode||sn||model) currentComp.items.push({type:t,brand,assetCode,model,sn,regNo});
    }
  }
  Object.keys(result).forEach(k=>{ if(!result[k].items.length) delete result[k]; });
  return result;
}

// ── Stats ─────────────────────────────────────────
function calcStats(){
  let total=0,checked=0,issue=0,reg=0;
  Object.keys(checkData).forEach(ck=>{
    checkData[ck].items.forEach((_,i)=>{
      const st=checkState[stateKey(ck,i)]||{};
      total++;
      if(st.checked) checked++;
      if(st.assetCodeActual||st.modelActual||st.snActual) issue++;
      if(st.updatedInRegistry) reg++;
    });
  });
  return{total,checked,issue,reg,computers:Object.keys(checkData).length};
}
function updateSummary(){
  const s=calcStats(), el=id=>document.getElementById(id);
  if(el('sumComp'))    el('sumComp').textContent=s.computers;
  if(el('sumTotal'))   el('sumTotal').textContent=s.total;
  if(el('sumChecked')) el('sumChecked').textContent=s.checked;
  if(el('sumIssue'))   el('sumIssue').textContent=s.issue;
  if(el('sumReg'))     el('sumReg').textContent=s.reg;
  if(el('pageSubtitle'))
    el('pageSubtitle').textContent=`${s.computers} เครื่อง · เช็คแล้ว ${s.checked}/${s.total} รายการ`;
}

// ── Issue panel toggle — ซ่อนเสมอ เปิดเมื่อกดปุ่มเท่านั้น ─
function toggleIssuePanel(sk, cid, i){
  const panel=document.getElementById(`ipanel_${cid}_${i}`);

  panel.classList.toggle('open', willOpen);

// ── Mark dirty (พิมพ์แล้วยังไม่บันทึก) ──────────
function markDirty(cid, i, input){
  input.classList.toggle('has-val', input.value.trim().length>0);
  input.classList.add('dirty');
  const btn=document.getElementById(`savebtn_${cid}_${i}`);
  if(btn){ btn.classList.remove('saved'); btn.classList.add('dirty'); btn.innerHTML='💾 บันทึก (มีการเปลี่ยนแปลง)'; }
}

// ── Save — manual button only ────────────────────
async function saveIssuePanel(sk, cid, i){
  const btn=document.getElementById(`savebtn_${cid}_${i}`);
  const fields={
    assetCodeActual: document.getElementById(`f_assetCode_${cid}_${i}`)?.value.trim()||'',
    modelActual:     document.getElementById(`f_model_${cid}_${i}`)?.value.trim()||'',
    snActual:        document.getElementById(`f_sn_${cid}_${i}`)?.value.trim()||'',
  };

  if(btn){ btn.classList.remove('dirty'); btn.classList.add('saving'); btn.innerHTML='⏳ กำลังบันทึก...'; btn.disabled=true; }

  if(!checkState[sk]) checkState[sk]={};
  Object.entries(fields).forEach(([f,v])=>{ if(v) checkState[sk][f]=v; else delete checkState[sk][f]; });

  ['f_assetCode','f_model','f_sn'].forEach(p=>{ document.getElementById(`${p}_${cid}_${i}`)?.classList.remove('dirty'); });

  await new Promise(r=>{ saveStorage(); setTimeout(r,700); });

  if(btn){ btn.classList.remove('saving'); btn.classList.add('saved'); btn.innerHTML='✅ บันทึกแล้ว'; btn.disabled=false; }

  _updateRow(sk,cid,i);
  _updateCompHeader(sk.split('||')[0]);
  updateSummary();

  // ปิด panel หลังบันทึกสำเร็จ 800ms
  setTimeout(()=>{
    document.getElementById(`ipanel_${cid}_${i}`)?.classList.remove('open');
    const b=document.getElementById(`savebtn_${cid}_${i}`);
    if(b){ b.classList.remove('saved'); b.innerHTML='💾 บันทึก'; }
  },800);
}

  else if(doneN>0)            { badgeCls='comp-status-partial'; badgeTxt=`⏳ กำลังเช็ค ${doneN}/${totalItems}`; nameColor=''; }
  else                        { badgeCls='comp-status-pending'; badgeTxt='○ ยังไม่ได้เช็ค';              nameColor=''; }

  if(bi){ bi.classList.toggle('active',hasIssue); bi.textContent=`⚠️ ${hasIssue?'มีปัญหา':'มีปัญหา?'}`; }
  const br=row.querySelector('.btn-reg');
  if(br){ br.classList.toggle('active',!!st.updatedInRegistry); br.textContent=st.updatedInRegistry?'📋 แก้แล้ว':'📋 แก้ในทะเบียน'; }

  const dw=row.querySelector('.dates-wrap');
  if(dw){
    dw.innerHTML='';
    if(st.checkedAt) dw.innerHTML+=`<div class="check-date">🕐 ${esc(st.checkedAt)}</div>`;
    if(st.checkedBy) dw.innerHTML+=`<div class="check-date">👤 ${esc(st.checkedBy)}</div>`;
    if(st.updatedInRegistry&&st.updatedAt) dw.innerHTML+=`<div class="check-date">📝 แก้ ${esc(st.updatedAt)}</div>`;
  }

  // อัปเดต pills
  const pw=document.getElementById(`pills_${cid}_${i}`);
  if(pw){
    let pillsHtml='';
    if(hasIssue){
      pillsHtml='<div class="issue-summary">';
      if(st.assetCodeActual) pillsHtml+=`<span class="issue-pill" title="Asset Code จริง">🏷️ ${esc(st.assetCodeActual)}</span>`;
      if(st.modelActual)     pillsHtml+=`<span class="issue-pill" title="รุ่นจริง">📦 ${esc(st.modelActual)}</span>`;
      if(st.snActual)        pillsHtml+=`<span class="issue-pill" title="SN จริง">🔢 ${esc(st.snActual)}</span>`;
      pillsHtml+='</div>';
    }
    pw.innerHTML=pillsHtml;
  }
}

// ── Toggle checked ────────────────────────────────
function toggleChecked(sk,cid,i){
  const cur=(checkState[sk]||{}).checked;
  if(!confirm(cur?'ยกเลิกการเช็ค?':'ยืนยันว่าเช็คแล้ว?')) return;
  if(!checkState[sk]) checkState[sk]={};
  const st=checkState[sk];
  st.checked=!cur;
  if(st.checked){
    st.checkedAt=new Date().toLocaleString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    st.checkedBy=currentUser?.displayName||currentUser?.email||'';
    // เช็คแล้ว = รับทราบแล้วว่าเป็นรายการใหม่ → เอา badge NEW ออก
    const ck=sk.split('||')[0], idx=parseInt(sk.split('||')[1],10);
    if(checkData[ck]?.items?.[idx]?.isNew){
      delete checkData[ck].items[idx].isNew;
      document.getElementById(`newbadge_${cid}_${i}`)?.remove();
    }
  } else { delete st.checkedAt; delete st.checkedBy; }
  saveStorage(); _updateRow(sk,cid,i); _updateCompHeader(sk.split('||')[0]); updateSummary();
}

// ── Toggle registry ───────────────────────────────
function toggleReg(sk,cid,i){
  const cur=(checkState[sk]||{}).updatedInRegistry;
  if(!confirm(cur?'ยกเลิกการแก้ในระบบ?':'ยืนยันว่าแก้ในระบบแล้ว?')) return;
  if(!checkState[sk]) checkState[sk]={};
  const st=checkState[sk];
  st.updatedInRegistry=!cur;
  if(st.updatedInRegistry)
    st.updatedAt=new Date().toLocaleString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
  else delete st.updatedAt;
  saveStorage(); _updateRow(sk,cid,i); updateSummary();
}

// ── Delete a single item (เช่น Monitor, Computer Set, UPS) ──
// รักษาความสัมพันธ์ของ checkState เมื่อลบรายการกลางลิสต์ โดย re-index
// key ของรายการที่อยู่หลังตำแหน่งที่ลบให้เลื่อนลงมา 1 ตำแหน่ง
function deleteItem(ck, i){
  const comp=checkData[ck];
  if(!comp || !comp.items[i]) return;
  const item=comp.items[i];
  const label=`${item.type}${item.assetCode?` (${item.assetCode})`:''}`;
  if(!confirm(`ลบรายการ "${label}" ออกจากเครื่อง "${ck}"?\nการกระทำนี้ไม่สามารถย้อนกลับได้`)) return;

  const total=comp.items.length;
  // เลื่อน checkState ของรายการถัดไปมาแทนที่ตำแหน่งที่ถูกลบ ทีละตัว
  for(let idx=i; idx<total-1; idx++){
    const nextKey=stateKey(ck, idx+1);
    const curKey =stateKey(ck, idx);
    if(checkState[nextKey]!==undefined) checkState[curKey]=checkState[nextKey];
    else delete checkState[curKey];
  }
  // ลบ key สุดท้ายที่เหลือค้างอยู่ (ซ้ำกับตัวที่เพิ่งย้ายไปแล้ว)
  delete checkState[stateKey(ck, total-1)];

  comp.items.splice(i,1);

  // ถ้าลบจนไม่เหลือรายการในเครื่องนี้แล้ว → ลบเครื่องออกไปเลย
  if(comp.items.length===0){
    delete checkData[ck];
    Object.keys(checkState).forEach(k=>{ if(k.startsWith(ck+'||')) delete checkState[k]; });
  }

  _ckIndex={}; _ckIndexRev={};
  saveStorage();
  renderAll();
  showNotif(`ลบรายการ "${label}" แล้ว`);
}

// ── Delete a whole computer ───────────────────────
function deleteComputer(ck){
  const comp=checkData[ck];
  if(!comp) return;
  if(!confirm(`ลบเครื่อง "${ck}" ทั้งหมด (${comp.items.length} รายการ)?\nผลการเช็คและข้อมูลทั้งหมดของเครื่องนี้จะหายไปด้วย และไม่สามารถย้อนกลับได้`)) return;

  delete checkData[ck];
  Object.keys(checkState).forEach(k=>{ if(k.startsWith(ck+'||')) delete checkState[k]; });

  _ckIndex={}; _ckIndexRev={};
  saveStorage();
  renderAll();
  showNotif(`ลบเครื่อง "${ck}" แล้ว`);
}

// ── Clear all ─────────────────────────────────────
async function confirmClearAll(){
  if(!confirm('ลบข้อมูลทั้งหมด?\nผลการเช็คทั้งหมดจะหายไปด้วย')) return;
  checkData={}; checkState={}; _ckIndex={}; _ckIndexRev={};
  try{ await _sessionRef().delete(); }catch(e){}
  renderAll(); showNotif('ลบข้อมูลทั้งหมดแล้ว');
}
</script>
