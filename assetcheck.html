<style>
/* ── Page-specific styles ── */
.toolbar {
  display:flex; flex-wrap:wrap; align-items:center; gap:8px;
  margin-bottom:1rem;
}
.search-box {
  flex:1; min-width:180px; max-width:320px;
  padding:8px 12px; border:1.5px solid var(--bdrm); border-radius:var(--rad);
  font-size:13px; background:var(--surf); color:var(--tx1);
}
.search-box:focus { outline:none; border-color:var(--g); box-shadow:0 0 0 3px var(--gll); }

/* ── Computer group card ── */
.comp-group {
  background:var(--surf);
  border:1px solid var(--bdr);
  border-radius:var(--radlg);
  margin-bottom:1rem;
  overflow:hidden;
}
.comp-header {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:.75rem 1rem;
  background:linear-gradient(135deg, var(--gll) 0%, var(--surf) 100%);
  border-bottom:1px solid var(--bdr);
  cursor:pointer; user-select:none;
}
.comp-header:hover { background:linear-gradient(135deg,#d6f0e8,var(--surf)); }
.comp-name { font-size:14px; font-weight:700; color:var(--tx1); }
.comp-ip   { font-size:11px; color:var(--tx3); font-family:var(--mono); }
.comp-meta { font-size:11px; color:var(--tx3); }
.comp-toggle { margin-left:auto; font-size:12px; color:var(--tx3); flex-shrink:0; }
.comp-progress { display:flex; align-items:center; gap:6px; margin-left:auto; }
.progress-bar-wrap {
  width:80px; height:6px; background:var(--bdr); border-radius:3px; overflow:hidden;
}
.progress-bar-fill { height:100%; background:var(--g); border-radius:3px; transition:width .3s; }
.progress-label { font-size:10px; font-weight:700; color:var(--tx3); white-space:nowrap; }

/* ── Asset item row ── */
.asset-table { width:100%; border-collapse:collapse; }
.asset-table th {
  padding:8px 10px; font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.04em; color:var(--tx3);
  background:var(--bg); border-bottom:1px solid var(--bdr);
  text-align:left; white-space:nowrap;
}
.asset-row {
  border-bottom:1px solid var(--bdr);
  transition:background .15s;
}
.asset-row:last-child { border-bottom:none; }
.asset-row.checked { background:#F0FFF8; }
.asset-row.has-issue { background:#FFF8F0; }
.asset-row td { padding:8px 10px; vertical-align:middle; font-size:12px; }

.item-type  { font-size:11px; font-weight:700; color:var(--tx2); white-space:nowrap; }
.item-brand { font-size:11px; color:var(--tx3); }
.code-badge {
  font-family:var(--mono); font-size:10px;
  background:var(--bg); border:1px solid var(--bdr);
  border-radius:4px; padding:2px 6px; white-space:nowrap;
}
.sn-text  { font-family:var(--mono); font-size:11px; color:var(--tx2); }
.sn-note  { font-family:var(--mono); font-size:10px; color:var(--r); margin-top:2px; }

/* ── Issue input inline ── */
.issue-wrap { display:flex; flex-direction:column; gap:4px; min-width:140px; }
.issue-input {
  width:100%; padding:5px 8px;
  border:1.5px solid var(--bdrm); border-radius:var(--radsm);
  font-size:11px; font-family:var(--mono);
  background:var(--surf); color:var(--tx1);
  transition:border-color .15s;
}
.issue-input:focus { outline:none; border-color:var(--am); box-shadow:0 0 0 2px var(--aml); }
.issue-input.has-val { border-color:var(--r); background:var(--rl); }

/* ── Action buttons ── */
.check-actions { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

.btn-check {
  padding:5px 10px; border-radius:var(--radsm);
  font-size:11px; font-weight:700; cursor:pointer;
  border:1.5px solid var(--bdrm); background:var(--surf);
  transition:all .15s; white-space:nowrap; display:inline-flex; align-items:center; gap:4px;
}
.btn-check:hover { background:var(--gll); border-color:var(--g); color:var(--g); }
.btn-check.done { background:var(--g); border-color:var(--g); color:#fff; }

.btn-updated {
  padding:4px 8px; border-radius:var(--radsm);
  font-size:10px; font-weight:700; cursor:pointer;
  border:1.5px solid var(--bdrm); background:var(--surf);
  transition:all .15s; white-space:nowrap;
  display:inline-flex; align-items:center; gap:3px;
}
.btn-updated:hover { background:var(--aml); border-color:var(--am); color:var(--am); }
.btn-updated.done { background:var(--am); border-color:var(--am); color:#fff; }

.check-date { font-size:10px; color:var(--tx3); white-space:nowrap; }

/* ── Status badge ── */
.status-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0; display:inline-block;
}
.status-ok    { background:var(--g); }
.status-issue { background:var(--r); }
.status-pending { background:var(--bdrm); }

/* ── Summary bar ── */
.summary-bar {
  display:flex; gap:12px; flex-wrap:wrap;
  padding:.75rem 1rem;
  background:var(--surf); border:1px solid var(--bdr);
  border-radius:var(--radlg); margin-bottom:1rem;
}
.sum-item { display:flex; flex-direction:column; align-items:center; gap:2px; min-width:60px; }
.sum-num  { font-size:20px; font-weight:700; line-height:1; }
.sum-lbl  { font-size:10px; color:var(--tx3); font-weight:600; }

/* ── Import zone ── */
.import-zone {
  border:2px dashed var(--bdrm); border-radius:var(--radlg);
  padding:2rem; text-align:center;
  background:var(--bg); transition:all .2s; cursor:pointer;
  margin-bottom:1rem;
}
.import-zone.drag-over { border-color:var(--g); background:var(--gll); }
.import-zone-icon { font-size:32px; margin-bottom:.5rem; }
.import-zone p { font-size:13px; color:var(--tx3); line-height:1.6; }

/* ── Mobile responsive ── */
@media (max-width:640px) {
  .asset-table { display:block; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .comp-header { gap:6px; }
  .comp-progress { width:100%; justify-content:flex-end; margin-left:0; }
  .check-actions { justify-content:flex-start; }
}

/* ── Collapsible body ── */
.comp-body { display:block; }
.comp-body.collapsed { display:none; }

/* ── Highlighted search ── */
mark { background:#FFF176; border-radius:2px; }

/* ── Empty state ── */
.empty-state-page {
  text-align:center; padding:4rem 2rem; color:var(--tx3);
}
.empty-state-page .icon { font-size:48px; margin-bottom:1rem; }
.empty-state-page p { font-size:14px; line-height:1.7; }

<!-- ═══════════════════ SCRIPT ═══════════════════ -->
<script>
// ── State ──────────────────────────────────────────────
let currentUser = null, currentRole = 'user', db = null;
// checkData: { [compKey]: { computerName, ip, employee, dept, items:[{...}] } }
let checkData  = {};
// checkState: { [itemKey]: { checked, checkedAt, checkedBy, issueNote, updatedInRegistry, updatedAt } }
let checkState = {};

const STORE_KEY_DATA  = 'ryg_assetcheck_data';
const STORE_KEY_STATE = 'ryg_assetcheck_state';

// ── Init ───────────────────────────────────────────────
// Add assetcheck to nav (not adminOnly so all can access)
// We patch NAV_ITEMS before initShell
if (typeof NAV_ITEMS !== 'undefined') {
  const hasCheck = NAV_ITEMS.some(n => n.id === 'assetcheck');
  if (!hasCheck) {
    const dispIdx = NAV_ITEMS.findIndex(n => n.id === 'dispose');
    NAV_ITEMS.splice(dispIdx + 1, 0, {
      id: 'assetcheck', label: 'เช็คทรัพย์สิน', icon: '🔍',
      href: 'assetcheck.html', adminOnly: false
    });
  }
}

initShell('assetcheck', async (user, role, firestore) => {
  currentUser = user; currentRole = role; db = firestore;
  loadFromStorage();
  renderAll();
});

// ── Storage helpers ────────────────────────────────────
function saveToStorage() {
  try {
    localStorage.setItem(STORE_KEY_DATA,  JSON.stringify(checkData));
    localStorage.setItem(STORE_KEY_STATE, JSON.stringify(checkState));
  } catch(e) { console.warn('Storage save failed:', e); }
}

function loadFromStorage() {
  try {
    const d = localStorage.getItem(STORE_KEY_DATA);
    const s = localStorage.getItem(STORE_KEY_STATE);
    if (d) checkData  = JSON.parse(d);
    if (s) checkState = JSON.parse(s);
  } catch(e) { checkData = {}; checkState = {}; }
}

// ── Item key ──────────────────────────────────────────
function itemKey(compKey, idx) {
  return `${compKey}__${idx}`;
}

// ── Parse imported data ───────────────────────────────
function parseExcelData(workbook) {
  // Try to parse as HTML-based XLS (the format from this system)
  // We'll handle both real xlsx and the HTML-disguised xls
  const result = {};

  // Get first sheet
  const sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const rows  = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

  let currentComp = null;
  let compKey = null;
  let itemsStarted = false;

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i].map(c => String(c).trim());

    // Detect computer name row: "Computer name:" in any cell
    const compIdx = row.findIndex(c => c === 'Computer name:' || c === 'Computer name');
    if (compIdx !== -1) {
      compKey = row[compIdx + 1] || `COMP_${i}`;
      const ip = row[compIdx + 3] || '';
      // Next row has employee info
      const nextRow = rows[i + 1] ? rows[i + 1].map(c => String(c).trim()) : [];
      const employee = nextRow[1] || '';
      const dept     = nextRow[3] || '';
      if (!result[compKey]) {
        result[compKey] = { computerName: compKey, ip, employee, dept, items: [] };
      }
      currentComp = result[compKey];
      itemsStarted = false;
      continue;
    }

    // Detect header row for items
    if (row.includes('Asset Code') && row.includes('Sn')) {
      itemsStarted = true;
      continue;
    }

    // Parse item rows
    if (currentComp && itemsStarted) {
      // Skip blank or partial rows
      const hasContent = row.some(c => c.length > 0);
      if (!hasContent) continue;

      // Row format: [อุปกรณ์, ยี่ห้อ, AssetCode, ?, รุ่น, SN, สถานะ, เลขทะเบียน]
      const type      = row[0] || '';
      const brand     = row[1] || '';
      const assetCode = row[2] || '';
      const model     = row[4] || row[3] || '';
      const sn        = row[5] || row[4] || '';
      const regNo     = row[7] || '';

      if (!type || type === 'อุปกรณ์' || type === 'ประเภท') continue;
      if (['ยี่ห้อ','Asset Code','Sn','ผลิตภัณฑ์'].includes(type)) continue;

      currentComp.items.push({ type, brand, assetCode, model, sn, regNo });
    }
  }

  // Remove computers with no items (likely parse artifacts)
  Object.keys(result).forEach(k => {
    if (result[k].items.length === 0) delete result[k];
  });

  return result;
}

// ── Import handler ────────────────────────────────────
function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  readFile(file);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('importZone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
}

function readFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();

  reader.onload = (e) => {
    try {
      let wb;
      if (ext === 'xls') {
        // May be HTML-masquerading as XLS
        try {
          wb = XLSX.read(e.target.result, { type: 'binary' });
        } catch(err) {
          // Try HTML parser fallback
          const text = new TextDecoder('utf-8', { fatal:false }).decode(
            new Uint8Array(e.target.result)
          );
          wb = XLSX.read(text, { type: 'string' });
        }
      } else {
        wb = XLSX.read(e.target.result, { type: 'binary' });
      }

      const parsed = parseExcelData(wb);
      const count  = Object.keys(parsed).length;

      if (count === 0) {
        showNotif('ไม่พบข้อมูลในไฟล์ กรุณาตรวจสอบโครงสร้าง', 'error');
        return;
      }

      // Merge: keep existing checkState, add new data
      checkData = parsed;
      // Clean up orphaned state keys
      const validKeys = new Set();
      Object.keys(checkData).forEach(ck => {
        checkData[ck].items.forEach((_, idx) => validKeys.add(itemKey(ck, idx)));
      });
      Object.keys(checkState).forEach(k => {
        if (!validKeys.has(k)) delete checkState[k];
      });

      saveToStorage();
      renderAll();
      showNotif(`Import สำเร็จ ${count} เครื่อง`);
    } catch(err) {
      showNotif('อ่านไฟล์ไม่สำเร็จ: ' + err.message, 'error');
    }
  };

  reader.readAsBinaryString(file);
}

// ── Download template ─────────────────────────────────
function downloadTemplate() {
  // Create sample data matching expected format
  const wb = XLSX.utils.book_new();
  const data = [
    ['ลำดับ','1',''],
    ['HO'],
    ['ผู้รับผิดชอบดูแลอุปกรณ์',''],
    ['Computer name:','ACC001-RYG','IP Address','192.168.101.100',''],
    ['ชื่อ-สกุล','สมชาย ตัวอย่าง','ตำแหน่ง','พนักงาน'],
    ['อุปกรณ์'],
    ['อุปกรณ์','ยี่ห้อ','Asset Code','','ผลิตภัณฑ์/รุ่น/ขนาด','Sn','สถานะ','เลขทะเบียน'],
    ['Computer Set','Dell','OF21-0001','','Optiplex 3080','S/N : ABC123456','ใช้งาน','64/001'],
    ['Monitor','SAMSUNG','OF21-0002','','S24C330GAE','S/N : DEF789012','ใช้งาน','64/002'],
    ['UPS','Syndome','OF21-0003','','SZ-1001-PRO','S/N : GHI345678','ใช้งาน','64/003'],
    [''],
    ['ลำดับ','2',''],
    ['HO'],
    ['ผู้รับผิดชอบดูแลอุปกรณ์',''],
    ['Computer name:','ACC002-RYG','IP Address','192.168.101.101',''],
    ['ชื่อ-สกุล','สมหญิง ตัวอย่าง','ตำแหน่ง','ผู้จัดการ'],
    ['อุปกรณ์'],
    ['อุปกรณ์','ยี่ห้อ','Asset Code','','ผลิตภัณฑ์/รุ่น/ขนาด','Sn','สถานะ','เลขทะเบียน'],
    ['Computer Set','HP','OF22-0010','','EliteDesk 800','S/N : JKL012345','ใช้งาน','65/010'],
    ['Printer','HP','FNITD-0001','','LaserJet Pro M12a','S/N : MNO678901','ใช้งาน','65/011'],
    [''],
  ];
  const ws = XLSX.utils.aoa_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, 'AssetList');
  XLSX.writeFile(wb, 'assetcheck_template.xlsx');
  showNotif('ดาวน์โหลดไฟล์ตัวอย่างแล้ว');
}

// ── Confirm clear all ─────────────────────────────────
function confirmClearAll() {
  if (!confirm('ลบข้อมูลทั้งหมดออก?\nผลการเช็คทั้งหมดจะหายไปด้วย ต้อง import ไฟล์ใหม่')) return;
  checkData  = {};
  checkState = {};
  saveToStorage();
  renderAll();
  showNotif('ลบข้อมูลทั้งหมดแล้ว');
}

// ── Expand / Collapse ─────────────────────────────────
function expandAll() {
  document.querySelectorAll('.comp-body').forEach(el => el.classList.remove('collapsed'));
  document.querySelectorAll('.comp-toggle').forEach(el => el.textContent = '▲');
}
function collapseAll() {
  document.querySelectorAll('.comp-body').forEach(el => el.classList.add('collapsed'));
  document.querySelectorAll('.comp-toggle').forEach(el => el.textContent = '▼');
}
function toggleComp(compKey) {
  const body   = document.getElementById(`body_${CSS.escape(compKey)}`);
  const toggle = document.getElementById(`toggle_${CSS.escape(compKey)}`);
  if (!body) return;
  const collapsed = body.classList.toggle('collapsed');
  if (toggle) toggle.textContent = collapsed ? '▼' : '▲';
}

// ── Stats ─────────────────────────────────────────────
function calcStats() {
  let total=0, checked=0, issue=0, updated=0;
  Object.keys(checkData).forEach(ck => {
    checkData[ck].items.forEach((_, idx) => {
      const k = itemKey(ck, idx);
      const st = checkState[k] || {};
      total++;
      if (st.checked) checked++;
      if (st.issueNote) issue++;
      if (st.updatedInRegistry) updated++;
    });
  });
  return { total, checked, issue, updated, computers: Object.keys(checkData).length };
}

// ── Highlight search ──────────────────────────────────
function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(escaped, 'gi'),
    m => `<mark>${m}</mark>`);
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render all ────────────────────────────────────────
function renderAll() {
  const hasData = Object.keys(checkData).length > 0;
  const stats   = calcStats();
  const query   = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
  const filter  = document.getElementById('filterStatus')?.value || '';

  // Toggle UI sections
  document.getElementById('importZone').style.display   = hasData ? 'none' : 'block';
  document.getElementById('summaryBar').style.display   = hasData ? 'flex' : 'none';
  document.getElementById('mainToolbar').style.display  = hasData ? 'flex' : 'none';
  document.getElementById('btnClearAll').style.display  = hasData ? '' : 'none';

  if (hasData) {
    document.getElementById('pageSubtitle').textContent =
      `${stats.computers} เครื่อง · ${stats.checked}/${stats.total} รายการที่เช็คแล้ว`;
    document.getElementById('sumTotal').textContent    = stats.total;
    document.getElementById('sumChecked').textContent  = stats.checked;
    document.getElementById('sumIssue').textContent    = stats.issue;
    document.getElementById('sumUpdated').textContent  = stats.updated;
    document.getElementById('sumComputers').textContent= stats.computers;
  }

  const list = document.getElementById('assetList');
  if (!hasData) { list.innerHTML = ''; return; }

  let html = '';
  let visibleComps = 0;

  Object.keys(checkData).forEach(ck => {
    const comp  = checkData[ck];
    const items = comp.items;

    // Filter items
    const filteredItems = items.map((item, idx) => ({ item, idx })).filter(({ item, idx }) => {
      const k  = itemKey(ck, idx);
      const st = checkState[k] || {};

      // Search filter
      if (query) {
        const haystack = [ck, comp.computerName, comp.ip, item.type, item.brand,
                          item.assetCode, item.model, item.sn].join(' ').toLowerCase();
        if (!haystack.includes(query)) return false;
      }

      // Status filter
      if (filter === 'pending')  return !st.checked;
      if (filter === 'checked')  return  st.checked;
      if (filter === 'issue')    return  !!st.issueNote;

      return true;
    });

    if (filteredItems.length === 0) return;
    visibleComps++;

    // Compute comp progress
    const total  = items.length;
    const doneN  = items.filter((_, idx) => (checkState[itemKey(ck,idx)]||{}).checked).length;
    const pct    = total > 0 ? Math.round(doneN/total*100) : 0;
    const allDone = doneN === total;

    // ─── Computer header ───
    html += `
    <div class="comp-group" id="grp_${escHtml(ck)}">
      <div class="comp-header" onclick="toggleComp('${escHtml(ck)}')">
        <div style="flex-shrink:0;width:32px;height:32px;background:${allDone?'var(--g)':'var(--bg)'};
          border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;
          border:1.5px solid ${allDone?'var(--g)':'var(--bdrm)'};">🖥️</div>
        <div style="min-width:0">
          <div class="comp-name">${highlight(comp.computerName, query)}</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            ${comp.ip ? `<span class="comp-ip">${escHtml(comp.ip)}</span>` : ''}
            ${comp.employee ? `<span class="comp-meta">👤 ${escHtml(comp.employee)}</span>` : ''}
            ${comp.dept ? `<span class="comp-meta">📍 ${escHtml(comp.dept)}</span>` : ''}
          </div>
        </div>
        <div class="comp-progress">
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <span class="progress-label">${doneN}/${total}</span>
          <span id="toggle_${escHtml(ck)}" class="comp-toggle">▲</span>
        </div>
      </div>
      <div class="comp-body" id="body_${escHtml(ck)}">
        <div style="overflow-x:auto">
        <table class="asset-table">
          <thead>
            <tr>
              <th style="width:30px">#</th>
              <th>อุปกรณ์ / ยี่ห้อ</th>
              <th>Asset Code</th>
              <th>รุ่น / SN ในระบบ</th>
              <th>SN / ข้อมูลที่พบจริง (ถ้าต่าง)</th>
              <th style="min-width:130px">การดำเนินการ</th>
            </tr>
          </thead>
          <tbody>`;

    filteredItems.forEach(({ item, idx }) => {
      const k  = itemKey(ck, idx);
      const st = checkState[k] || {};
      const hasIssue = !!st.issueNote;
      const rowClass = st.checked ? (hasIssue ? 'has-issue' : 'checked') : '';

      html += `
            <tr class="asset-row ${rowClass}" id="row_${k}">
              <td style="color:var(--tx3);font-size:11px;">${idx+1}</td>
              <td>
                <div class="item-type">${highlight(item.type, query)}</div>
                <div class="item-brand">${highlight(item.brand, query)}</div>
              </td>
              <td>
                <span class="code-badge">${highlight(item.assetCode, query)}</span>
                ${item.regNo ? `<div style="font-size:10px;color:var(--tx3);margin-top:2px;">ทะเบียน: ${escHtml(item.regNo)}</div>` : ''}
              </td>
              <td>
                <div style="font-size:11px;font-weight:600">${highlight(item.model, query)}</div>
                <div class="sn-text">${highlight(item.sn, query)}</div>
              </td>
              <td>
                <div class="issue-wrap">
                  <input class="issue-input ${st.issueNote?'has-val':''}" type="text"
                    placeholder="กรอกเฉพาะถ้าข้อมูลไม่ตรง เช่น SN จริง: XXXXX"
                    value="${escHtml(st.issueNote||'')}"
                    oninput="onIssueChange('${k}', this)"
                    title="ระบุข้อมูลที่พบจริง (ไม่ลบข้อมูลเดิม)"/>
                  ${st.issueNote ? `<div class="sn-note">⚠️ พบความต่าง: ${escHtml(st.issueNote)}</div>` : ''}
                </div>
              </td>
              <td>
                <div class="check-actions">
                  <button class="btn-check ${st.checked?'done':''}"
                    onclick="toggleChecked('${k}')" title="เช็คแล้ว">
                    ${st.checked ? '✅ เช็คแล้ว' : '☐ เช็คแล้ว'}
                  </button>
                  <button class="btn-updated ${st.updatedInRegistry?'done':''}"
                    onclick="toggleUpdated('${k}')" title="แก้ไขในทะเบียนแล้ว">
                    ${st.updatedInRegistry ? '📋 แก้แล้ว' : '📋 แก้ใน\nทะเบียน'}
                  </button>
                </div>
                ${st.checkedAt ? `<div class="check-date">🕐 ${escHtml(st.checkedAt)}</div>` : ''}
                ${st.checkedBy ? `<div class="check-date">👤 ${escHtml(st.checkedBy)}</div>` : ''}
              </td>
            </tr>`;
    });

    html += `
          </tbody>
        </table>
        </div>
      </div>
    </div>`;
  });

  if (visibleComps === 0) {
    html = `<div class="empty-state-page">
      <div class="icon">🔍</div>
      <p>ไม่พบรายการที่ตรงกับเงื่อนไข<br>ลองปรับตัวกรองหรือคำค้นหา</p>
    </div>`;
  }

  list.innerHTML = html;
}

// ── Toggle checked ────────────────────────────────────
function toggleChecked(k) {
  if (!checkState[k]) checkState[k] = {};
  const st = checkState[k];
  st.checked = !st.checked;
  if (st.checked) {
    st.checkedAt = new Date().toLocaleString('th-TH', {
      day:'2-digit', month:'2-digit', year:'2-digit',
      hour:'2-digit', minute:'2-digit'
    });
    st.checkedBy = currentUser?.displayName || currentUser?.email || '';
  } else {
    delete st.checkedAt;
    delete st.checkedBy;
  }
  saveToStorage();
  renderAll();
  updateSummary();
}

// ── Toggle updated in registry ────────────────────────
function toggleUpdated(k) {
  if (!checkState[k]) checkState[k] = {};
  const st = checkState[k];
  st.updatedInRegistry = !st.updatedInRegistry;
  if (st.updatedInRegistry) {
    st.updatedAt = new Date().toLocaleString('th-TH', {
      day:'2-digit', month:'2-digit', year:'2-digit',
      hour:'2-digit', minute:'2-digit'
    });
  } else {
    delete st.updatedAt;
  }
  saveToStorage();
  renderAll();
}

// ── Issue note change ─────────────────────────────────
let _issueTimer = null;
function onIssueChange(k, input) {
  const val = input.value.trim();
  input.classList.toggle('has-val', val.length > 0);
  clearTimeout(_issueTimer);
  _issueTimer = setTimeout(() => {
    if (!checkState[k]) checkState[k] = {};
    checkState[k].issueNote = val;
    saveToStorage();
    // Update row background live
    const row = document.getElementById(`row_${k}`);
    if (row) {
      const st = checkState[k];
      row.className = `asset-row ${st.checked ? (val ? 'has-issue' : 'checked') : (val ? 'has-issue' : '')}`;
    }
    updateSummary();
  }, 400);
}

// ── Update summary numbers only (lightweight) ─────────
function updateSummary() {
  const stats = calcStats();
  const el = id => document.getElementById(id);
  if (el('sumTotal'))    el('sumTotal').textContent    = stats.total;
  if (el('sumChecked'))  el('sumChecked').textContent  = stats.checked;
  if (el('sumIssue'))    el('sumIssue').textContent    = stats.issue;
  if (el('sumUpdated'))  el('sumUpdated').textContent  = stats.updated;
  if (el('pageSubtitle')) el('pageSubtitle').textContent =
    `${stats.computers} เครื่อง · ${stats.checked}/${stats.total} รายการที่เช็คแล้ว`;
}
</script>
</body>
</html>
