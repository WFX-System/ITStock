.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:1rem;}
.search-box{flex:1;min-width:180px;max-width:300px;padding:8px 12px;border:1.5px solid var(--bdrm);

.issue-panel-row{display:none;}

mark{background:#FFF176;border-radius:2px;padding:0 1px;}

<body>

<script>
// ══════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════
let currentUser=null, currentRole='user', db=null;
let checkData={}, checkState={};

initShell('assetcheck', async(user,role,firestore)=>{
  currentUser=user; currentRole=role; db=firestore;
  await loadFromFirestore();
  renderAll();
});

// ── Firestore ──────────────────────────────────────
function _sessionRef(){
  return db.collection('assetSessions').doc(currentUser.uid);
}

let _saveTimer=null;
function saveStorage(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    try{
      await _sessionRef().set({
        checkData:  JSON.stringify(checkData),
        checkState: JSON.stringify(checkState),
        updatedAt:  firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy:  currentUser?.uid||'',
      },{merge:true});
    }catch(e){ console.warn('Firestore save error:',e); }
  }, 600);
}

async function loadFromFirestore(){
  try{
    const snap=await _sessionRef().get();
    if(snap.exists){
      const d=snap.data();
      if(d.checkData)  checkData=JSON.parse(d.checkData);
      if(d.checkState) checkState=JSON.parse(d.checkState);
    }
  }catch(e){ console.warn('Firestore load error:',e); checkData={}; checkState={}; }
}

// ── ID helpers ─────────────────────────────────────
let _ckIndex={}, _ckIndexRev={};
function getCkId(ck){
  if(_ckIndex[ck]===undefined){
    const n=Object.keys(_ckIndex).length;
    _ckIndex[ck]=n; _ckIndexRev[n]=ck;
  }
  return _ckIndex[ck];
}
function stateKey(ck,idx){return `${ck}||${idx}`;}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function highlight(s,q){
  if(!q)return esc(s);
  const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc(s).replace(new RegExp(e,'gi'),m=>`<mark>${m}</mark>`);
}

// ══════════════════════════════════════════════════
//  Import
// ══════════════════════════════════════════════════
function handleImport(input){
  const f=input.files[0]; if(!f)return; input.value=''; readExcelFile(f);
}
function handleDrop(e){
  e.preventDefault(); document.getElementById('importZone').classList.remove('drag-over');
  const f=e.dataTransfer.files[0]; if(f)readExcelFile(f);
}

function readExcelFile(file){
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      let wb;
      const data=ev.target.result;
      try{ wb=XLSX.read(data,{type:'binary'}); }
      catch(err){
        const text=new TextDecoder('utf-8',{fatal:false}).decode(new Uint8Array(
          new Uint8Array(data.length).map((_,i)=>data.charCodeAt(i))
        ));
        wb=XLSX.read(text,{type:'string'});
      }
      const parsed=parseWorkbook(wb);
      const n=Object.keys(parsed).length;
      if(n===0){showNotif('ไม่พบข้อมูล กรุณาตรวจสอบโครงสร้างไฟล์','error');return;}
      checkData=parsed;
      const valid=new Set();
      Object.keys(checkData).forEach(ck=>checkData[ck].items.forEach((_,i)=>valid.add(stateKey(ck,i))));
      Object.keys(checkState).forEach(k=>{if(!valid.has(k))delete checkState[k];});
      _ckIndex={}; _ckIndexRev={};
      saveStorage(); renderAll();
      showNotif(`Import สำเร็จ พบ ${n} เครื่อง`);
    }catch(err){showNotif('อ่านไฟล์ไม่สำเร็จ: '+err.message,'error');}
  };
  reader.readAsBinaryString(file);
}

function parseWorkbook(wb){
  const result={};
  const sheetName=wb.SheetNames[0];
  const ws=wb.Sheets[sheetName];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  let currentComp=null, ck=null, inItems=false;
  for(let i=0;i<rows.length;i++){
    const row=rows[i].map(c=>String(c).trim());
    const ci=row.findIndex(c=>c==='Computer name:');
    if(ci!==-1){
      ck=row[ci+1]||`COMP_${i}`;
      const ip=row[ci+3]||'';
      const nr=(rows[i+1]||[]).map(c=>String(c).trim());
      const emp=nr[1]||'', dept=nr[3]||'';
      if(!result[ck]) result[ck]={computerName:ck,ip,employee:emp,dept,items:[]};
      currentComp=result[ck]; inItems=false;
      continue;
    }
    if(row.includes('Asset Code')&&(row.includes('Sn')||row.includes('SN'))){
      inItems=true; continue;
    }
    if(currentComp&&inItems){
      const has=row.some(c=>c.length>0); if(!has)continue;
      const t=row[0];
      if(!t||['อุปกรณ์','ประเภท','ยี่ห้อ'].includes(t))continue;
      if(t==='Asset Code'||t.includes('Asset'))continue;
      const brand=row[1]||'', assetCode=row[2]||'';
      const model=row[4]||row[3]||'', sn=row[5]||row[4]||'', regNo=row[7]||row[6]||'';
      if(assetCode||sn||model) currentComp.items.push({type:t,brand,assetCode,model,sn,regNo});
    }
  }
  Object.keys(result).forEach(k=>{if(!result[k].items.length)delete result[k];});
  return result;
}

// ══════════════════════════════════════════════════
//  Template
// ══════════════════════════════════════════════════
function downloadTemplate(){
  const wb=XLSX.utils.book_new();
  const d=[
    ['ลำดับ','1',''],
    ['HO'],
    ['ผู้รับผิดชอบดูแลอุปกรณ์',''],
    ['Computer name:','ACC001-RYG','IP Address','192.168.101.100',''],
    ['ชื่อ-สกุล','สมชาย ตัวอย่าง','ตำแหน่ง','พนักงาน IT'],
    ['อุปกรณ์'],
    ['อุปกรณ์','ยี่ห้อ','Asset Code','','ผลิตภัณฑ์/รุ่น/ขนาด','Sn','สถานะ','เลขทะเบียน'],
    ['Computer Set','Dell','OF21-0001','','Optiplex 3080','S/N : ABC123456','ใช้งาน','64/001'],
    ['Monitor','SAMSUNG','OF21-0002','','S24C330GAE','S/N : DEF789012','ใช้งาน','64/002'],
    ['UPS','Syndome','OF21-0003','','SZ-1001-PRO','S/N : GHI345678','ใช้งาน','64/003'],
    [''],
    ['ลำดับ','2',''],
    ['HO'],
    ['ผู้รับผิดชอบดูแลอุปกรณ์',''],
    ['Computer name:','MMD001-RYG','IP Address','192.168.101.101',''],
    ['ชื่อ-สกุล','สมหญิง ตัวอย่าง','ตำแหน่ง','ผู้จัดการ'],
    ['อุปกรณ์'],
    ['อุปกรณ์','ยี่ห้อ','Asset Code','','ผลิตภัณฑ์/รุ่น/ขนาด','Sn','สถานะ','เลขทะเบียน'],
    ['Computer Set','HP','OF22-0010','','EliteDesk 800','S/N : JKL012345','ใช้งาน','65/010'],
    ['Printer','HP','FNITD-0001','','LaserJet Pro M12a','S/N : MNO678901','ใช้งาน','65/011'],
    [''],
  ];
  const ws=XLSX.utils.aoa_to_sheet(d);
  ws['!cols']=[{wch:15},{wch:20},{wch:15},{wch:5},{wch:22},{wch:22},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'AssetList');
  XLSX.writeFile(wb,'assetcheck_template.xlsx');
  showNotif('ดาวน์โหลดไฟล์ตัวอย่างแล้ว');

// ══════════════════════════════════════════════════
//  Stats
// ══════════════════════════════════════════════════
function calcStats(){
  let total=0,checked=0,issue=0,reg=0;
  Object.keys(checkData).forEach(ck=>{
    checkData[ck].items.forEach((_,i)=>{
      const st=checkState[stateKey(ck,i)]||{};
      total++;
      if(st.checked)checked++;
      if(st.assetCodeActual||st.modelActual||st.snActual)issue++;
      if(st.updatedInRegistry)reg++;
    });
  });
  return{total,checked,issue,reg,computers:Object.keys(checkData).length};
}

function updateSummary(){
  const s=calcStats();
  const el=id=>document.getElementById(id);
  if(el('sumComp'))    el('sumComp').textContent=s.computers;
  if(el('sumTotal'))   el('sumTotal').textContent=s.total;
  if(el('sumChecked')) el('sumChecked').textContent=s.checked;
  if(el('sumIssue'))   el('sumIssue').textContent=s.issue;
  if(el('sumReg'))     el('sumReg').textContent=s.reg;
  if(el('pageSubtitle'))
    el('pageSubtitle').textContent=`${s.computers} เครื่อง · เช็คแล้ว ${s.checked}/${s.total} รายการ`;
}

// ══════════════════════════════════════════════════
//  Render
// ══════════════════════════════════════════════════
function renderAll(){
  _ckIndex={}; _ckIndexRev={};
  const hasData=Object.keys(checkData).length>0;
  const q=(document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  const filter=document.getElementById('filterSel')?.value||'';

  document.getElementById('importZone').style.display  =hasData?'none':'block';
  document.getElementById('summaryBar').style.display  =hasData?'flex':'none';
  document.getElementById('toolbarRow').style.display  =hasData?'flex':'none';
  document.getElementById('btnClearAll').style.display =hasData?'':'none';

  if(hasData) updateSummary();

  const list=document.getElementById('assetList');
  if(!hasData){list.innerHTML='';return;}

  // ── Sort ────────────────────────────────────────
  const sort=document.getElementById('sortSel')?.value||'name';
  const sortedCks=Object.keys(checkData).sort((a,b)=>{
    if(sort==='name') return a.localeCompare(b,'th');
    const getProgress=(ck)=>{
      const items=checkData[ck].items;
      if(!items.length)return 0;
      return items.filter((_,i)=>(checkState[stateKey(ck,i)]||{}).checked).length/items.length;
    };
    const getIssue=(ck)=>checkData[ck].items.some((_,i)=>{
      const st=checkState[stateKey(ck,i)]||{};
      return !!(st.assetCodeActual||st.modelActual||st.snActual);
    })?1:0;
    if(sort==='progress_asc') return getProgress(a)-getProgress(b);
    if(sort==='progress_desc') return getProgress(b)-getProgress(a);
    if(sort==='issue') return getIssue(b)-getIssue(a)||a.localeCompare(b,'th');
    return 0;
  });

  let html=''; let visCount=0;
  sortedCks.forEach(ck=>{
    const comp=checkData[ck];
    const cid=getCkId(ck);

    const filtered=comp.items.map((item,i)=>({item,i})).filter(({item,i})=>{
      const st=checkState[stateKey(ck,i)]||{};
      if(q){
        const hay=[ck,comp.ip,comp.employee,comp.dept,item.type,item.brand,
                   item.assetCode,item.model,item.sn,item.regNo].join(' ').toLowerCase();
        if(!hay.includes(q))return false;
      }
      if(filter==='pending') return !st.checked;
      if(filter==='checked') return  st.checked;
      if(filter==='issue')   return  !!(st.assetCodeActual||st.modelActual||st.snActual);
      return true;
    });

    if(!filtered.length)return;
    visCount++;

    const totalItems=comp.items.length;
    const doneN=comp.items.filter((_,i)=>(checkState[stateKey(ck,i)]||{}).checked).length;
    const issueN=comp.items.filter((_,i)=>{const st=checkState[stateKey(ck,i)]||{};return !!(st.assetCodeActual||st.modelActual||st.snActual);}).length;
    const pct=totalItems?Math.round(doneN/totalItems*100):0;
    const allDone=doneN===totalItems;

    // Badge logic
    let badgeCls, badgeTxt, nameColor;
    if(issueN>0){
      badgeCls='comp-status-issue'; badgeTxt=`⚠️ มีปัญหา ${issueN} รายการ`; nameColor='#991B1B';
    } else if(allDone && totalItems>0){
      badgeCls='comp-status-ok'; badgeTxt='✅ เช็คครบ ไม่มีปัญหา'; nameColor='#065F46';
    } else if(doneN>0){
      badgeCls='comp-status-partial'; badgeTxt=`⏳ กำลังเช็ค ${doneN}/${totalItems}`; nameColor='';
    } else {
      badgeCls='comp-status-pending'; badgeTxt='○ ยังไม่ได้เช็ค'; nameColor='';
    }

    html+=`
<div class="comp-group">
  <div class="comp-header" onclick="toggleComp(${cid})">
    <div style="width:34px;height:34px;background:${allDone&&!issueN?'var(--g)':(issueN?'#FEE2E2':'var(--bg)')};
      border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;
      border:1.5px solid ${allDone&&!issueN?'var(--g)':(issueN?'#FCA5A5':'var(--bdrm)')};flex-shrink:0;">🖥️</div>
    <div style="flex:1;min-width:0;">
      <div class="comp-name" style="${nameColor?`color:${nameColor};`:''}">
        ${highlight(comp.computerName,q)}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:2px;">
        <span class="comp-status-badge ${badgeCls}">${badgeTxt}</span>
        ${comp.ip?`<span class="comp-ip">${esc(comp.ip)}</span>`:''}
        ${comp.employee?`<span class="comp-meta">👤 ${highlight(comp.employee,q)}</span>`:''}
        ${comp.dept?`<span class="comp-meta">📍 ${highlight(comp.dept,q)}</span>`:''}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="prog-lbl">${doneN}/${totalItems}</span>
      <span id="tog${cid}" style="font-size:12px;color:var(--tx3);">▲</span>
    </div>
  </div>
  <div class="comp-body" id="body${cid}">
    <div style="overflow-x:auto;">
    <table class="asset-table">
      <thead><tr>
        <th style="width:28px;">#</th>
        <th>อุปกรณ์ / ยี่ห้อ</th>
        <th>ในระบบ<br><span style="font-weight:400;font-size:9px;text-transform:none;">Asset Code / เลขทะเบียน / รุ่น / SN</span></th>
        <th style="min-width:160px;">การดำเนินการ</th>
      </tr></thead>
      <tbody>`;

    filtered.forEach(({item,i})=>{
      const sk=stateKey(ck,i);
      const st=checkState[sk]||{};
      const hasIssue=!!(st.assetCodeActual||st.modelActual||st.snActual);
      const rowCls=st.checked?(hasIssue?'row-issue':'row-ok'):(hasIssue?'row-issue':'');

      html+=`
      <tr class="asset-row ${rowCls}" id="arow_${cid}_${i}">
        <td style="color:var(--tx3);font-size:11px;">${i+1}</td>
        <td>
          <div style="font-size:12px;font-weight:700;">${highlight(item.type,q)}</div>
          <div style="font-size:11px;color:var(--tx3);">${highlight(item.brand,q)}</div>
        </td>
        <td>
          <span class="code-badge">${highlight(item.assetCode,q)}</span>
          ${item.regNo?`<div style="font-size:10px;color:var(--tx3);margin-top:2px;">📋 ${esc(item.regNo)}</div>`:''}
          <div style="font-size:11px;font-weight:600;margin-top:3px;">${highlight(item.model,q)}</div>
          <div class="sn-text">${highlight(item.sn,q)}</div>
        </td>
        <td>
          <div style="display:flex;flex-direction:column;gap:5px;">
            <div style="display:flex;gap:5px;flex-wrap:wrap;">
              <button class="btn-chk ${st.checked?'active':''}"
                onclick="toggleChecked('${esc(sk)}',${cid},${i})">
                ${st.checked?'✅ เช็คแล้ว':'☐ เช็คแล้ว'}
              </button>
              <button class="btn-issue ${hasIssue?'active':''}"
                onclick="toggleIssuePanel('${esc(sk)}',${cid},${i})">
                ⚠️ ${hasIssue?'มีปัญหา':'มีปัญหา?'}
              </button>
            </div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;">
              <button class="btn-reg ${st.updatedInRegistry?'active':''}"
                onclick="toggleReg('${esc(sk)}',${cid},${i})"
                title="แก้ไขในทะเบียนทรัพย์สินแล้ว">
                ${st.updatedInRegistry?'📋 แก้แล้ว':'📋 แก้ในทะเบียน'}
              </button>
            </div>
            ${st.checkedAt?`<div class="check-date">🕐 ${esc(st.checkedAt)}</div>`:''}
            ${st.checkedBy?`<div class="check-date">👤 ${esc(st.checkedBy)}</div>`:''}
            ${st.updatedInRegistry&&st.updatedAt?`<div class="check-date">📝 แก้ ${esc(st.updatedAt)}</div>`:''}
          </div>
        </td>
      </tr>
      <tr class="issue-panel-row" id="ipanel_${cid}_${i}">
        <td colspan="4">
          <div class="issue-panel-inner">
            <div>
              <label>Asset Code จริง</label>
              <input class="issue-input ${st.assetCodeActual?'has-val':''}" type="text"
                value="${esc(st.assetCodeActual||'')}"
                placeholder="ถ้าต่างจากในระบบ..."
                oninput="onFieldChange('${esc(sk)}','assetCodeActual',${cid},${i},this)"/>
            </div>
            <div>
              <label>รุ่นจริง</label>
              <input class="issue-input ${st.modelActual?'has-val':''}" type="text"
                value="${esc(st.modelActual||'')}"
                placeholder="ถ้าต่างจากในระบบ..."
                oninput="onFieldChange('${esc(sk)}','modelActual',${cid},${i},this)"/>
            </div>
            <div style="grid-column:1/-1;">
              <label>SN จริง</label>
              <input class="issue-input ${st.snActual?'has-val':''}" type="text"
                value="${esc(st.snActual||'')}"
                placeholder="ถ้าต่างจากในระบบ..."
                oninput="onFieldChange('${esc(sk)}','snActual',${cid},${i},this)"/>
            </div>
          </div>
        </td>
      </tr>`;
    });

    html+=`
      </tbody>
    </table>
    </div>
  </div>
</div>`;
  });

  if(!visCount){
    html=`<div class="empty-pg"><div class="icon">🔍</div>
      <p>ไม่พบรายการที่ตรงกับเงื่อนไข<br>ลองปรับตัวกรองหรือคำค้นหา</p></div>`;
  }
  list.innerHTML=html;

  // เปิด issue panel อัตโนมัติสำหรับแถวที่มีข้อมูลปัญหาอยู่แล้ว
  Object.keys(checkData).forEach(ck=>{
    const cid=getCkId(ck);
    checkData[ck].items.forEach((_,i)=>{
      const sk=stateKey(ck,i);
      const st=checkState[sk]||{};
      if(st.assetCodeActual||st.modelActual||st.snActual){
        const panel=document.getElementById(`ipanel_${cid}_${i}`);
        if(panel) panel.style.display='';
      }
    });
  });
}

// ══════════════════════════════════════════════════
//  Actions — อัปเดต DOM in-place ไม่ re-render ทั้งหน้า
// ══════════════════════════════════════════════════
function toggleComp(cid){
  const body=document.getElementById('body'+cid);
  const tog =document.getElementById('tog'+cid);
  if(!body)return;
  const col=body.classList.toggle('collapsed');
  if(tog) tog.textContent=col?'▼':'▲';
}
function expandAll(){
  Object.keys(_ckIndexRev).forEach(n=>{
    const b=document.getElementById('body'+n),t=document.getElementById('tog'+n);
    if(b)b.classList.remove('collapsed'); if(t)t.textContent='▲';
  });
}
function collapseAll(){
  Object.keys(_ckIndexRev).forEach(n=>{
    const b=document.getElementById('body'+n),t=document.getElementById('tog'+n);
    if(b)b.classList.add('collapsed'); if(t)t.textContent='▼';
  });
}

function toggleIssuePanel(sk, cid, i){
  const panel=document.getElementById(`ipanel_${cid}_${i}`);
  if(!panel)return;
  const computed=window.getComputedStyle(panel).display;
  const isOpen=computed!=='none';
  panel.style.display=isOpen?'none':'table-row';
  const btn=document.querySelector(`#arow_${cid}_${i} .btn-issue`);
  if(btn) btn.style.borderColor=isOpen?'':'var(--r)';
}

// ── helper: อัปเดต header ของ comp กลุ่มที่เปลี่ยนไป ──
function _updateCompHeader(ck){
  const cid=_ckIndex[ck];
  if(cid===undefined)return;
  const comp=checkData[ck];
  const totalItems=comp.items.length;
  const doneN=comp.items.filter((_,i)=>(checkState[stateKey(ck,i)]||{}).checked).length;
  const issueN=comp.items.filter((_,i)=>{const st=checkState[stateKey(ck,i)]||{};return !!(st.assetCodeActual||st.modelActual||st.snActual);}).length;
  const pct=totalItems?Math.round(doneN/totalItems*100):0;
  const allDone=doneN===totalItems;

  let badgeCls,badgeTxt,nameColor;
  if(issueN>0){badgeCls='comp-status-issue';badgeTxt=`⚠️ มีปัญหา ${issueN} รายการ`;nameColor='#991B1B';}
  else if(allDone&&totalItems>0){badgeCls='comp-status-ok';badgeTxt='✅ เช็คครบ ไม่มีปัญหา';nameColor='#065F46';}
  else if(doneN>0){badgeCls='comp-status-partial';badgeTxt=`⏳ กำลังเช็ค ${doneN}/${totalItems}`;nameColor='';}
  else{badgeCls='comp-status-pending';badgeTxt='○ ยังไม่ได้เช็ค';nameColor='';}

  // progress bar + counter
  const fill=document.querySelector(`#body${cid}`?.replace(/\d+/,'')+`#body${cid}`)?.previousElementSibling?.querySelector('.prog-fill');
  const header=document.querySelector(`#body${cid}`)?.previousElementSibling;
  if(header){
    const progFill=header.querySelector('.prog-fill');
    if(progFill) progFill.style.width=pct+'%';
    const progLbl=header.querySelector('.prog-lbl');
    if(progLbl) progLbl.textContent=`${doneN}/${totalItems}`;
    const nameEl=header.querySelector('.comp-name');
    if(nameEl) nameEl.style.color=nameColor||'';
    const badge=header.querySelector('.comp-status-badge');
    if(badge){badge.className=`comp-status-badge ${badgeCls}`;badge.textContent=badgeTxt;}
    // icon bg
    const icon=header.querySelector('div[style*="border-radius:8px"]');
    if(icon){
      icon.style.background=allDone&&!issueN?'var(--g)':(issueN?'#FEE2E2':'var(--bg)');
      icon.style.borderColor=allDone&&!issueN?'var(--g)':(issueN?'#FCA5A5':'var(--bdrm)');
    }
  }
}

// ── helper: อัปเดต DOM ของแถวเดียว ──
function _updateRow(sk, cid, i){
  const st=checkState[sk]||{};
  const hasIssue=!!(st.assetCodeActual||st.modelActual||st.snActual);
  const row=document.getElementById(`arow_${cid}_${i}`);
  if(!row)return;

  // row color
  row.className=`asset-row ${st.checked?(hasIssue?'row-issue':'row-ok'):(hasIssue?'row-issue':'')}`;

  // btn-chk
  const btnChk=row.querySelector('.btn-chk');
  if(btnChk){
    btnChk.classList.toggle('active',!!st.checked);
    btnChk.textContent=st.checked?'✅ เช็คแล้ว':'☐ เช็คแล้ว';
  }
  // btn-issue
  const btnIssue=row.querySelector('.btn-issue');
  if(btnIssue){
    btnIssue.classList.toggle('active',hasIssue);
    btnIssue.textContent=`⚠️ ${hasIssue?'มีปัญหา':'มีปัญหา?'}`;
  }
  // btn-reg
  const btnReg=row.querySelector('.btn-reg');
  if(btnReg){
    btnReg.classList.toggle('active',!!st.updatedInRegistry);
    btnReg.textContent=st.updatedInRegistry?'📋 แก้แล้ว':'📋 แก้ในทะเบียน';
  }
  // timestamps
  const actionCell=row.querySelector('td:last-child');
  if(actionCell){
    let dates=actionCell.querySelector('.dates-wrap');
    if(!dates){dates=document.createElement('div');dates.className='dates-wrap';actionCell.querySelector('div').appendChild(dates);}
    dates.innerHTML='';
    if(st.checkedAt) dates.innerHTML+=`<div class="check-date">🕐 ${esc(st.checkedAt)}</div>`;
    if(st.checkedBy) dates.innerHTML+=`<div class="check-date">👤 ${esc(st.checkedBy)}</div>`;
    if(st.updatedInRegistry&&st.updatedAt) dates.innerHTML+=`<div class="check-date">📝 แก้ ${esc(st.updatedAt)}</div>`;
  }
}

function toggleChecked(sk,cid,i){
  const cur=(checkState[sk]||{}).checked;
  if(!confirm(cur?'ยกเลิกการเช็ค?':'ยืนยันว่าเช็คแล้ว?'))return;
  if(!checkState[sk])checkState[sk]={};
  const st=checkState[sk];
  st.checked=!cur;
  if(st.checked){
    st.checkedAt=new Date().toLocaleString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    st.checkedBy=currentUser?.displayName||currentUser?.email||'';
  } else { delete st.checkedAt; delete st.checkedBy; }
  saveStorage();
  _updateRow(sk,cid,i);
  // หา ck จาก stateKey
  const ck=sk.split('||')[0];
  _updateCompHeader(ck);
  updateSummary();
}

function toggleReg(sk,cid,i){
  const cur=(checkState[sk]||{}).updatedInRegistry;
  if(!confirm(cur?'ยกเลิกการแก้ในระบบ?':'ยืนยันว่าแก้ในระบบแล้ว?'))return;
  if(!checkState[sk])checkState[sk]={};
  const st=checkState[sk];
  st.updatedInRegistry=!cur;
  if(st.updatedInRegistry)
    st.updatedAt=new Date().toLocaleString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
  else delete st.updatedAt;
  saveStorage();
  _updateRow(sk,cid,i);
  updateSummary();
}

let _fieldTimer=null;
function onFieldChange(sk,field,cid,i,input){
  const val=input.value.trim();
  input.classList.toggle('has-val',val.length>0);
  clearTimeout(_fieldTimer);
  _fieldTimer=setTimeout(()=>{
    if(!checkState[sk])checkState[sk]={};
    if(val) checkState[sk][field]=val;
    else delete checkState[sk][field];
    saveStorage();
    _updateRow(sk,cid,i);
    const ck=sk.split('||')[0];
    _updateCompHeader(ck);
    updateSummary();
  },400);
}

async function confirmClearAll(){
  if(!confirm('ลบข้อมูลทั้งหมด?\nผลการเช็คทั้งหมดจะหายไปด้วย'))return;
  checkData={}; checkState={}; _ckIndex={}; _ckIndexRev={};
  try{ await _sessionRef().delete(); }catch(e){ console.warn('Firestore delete error:',e); }
  renderAll(); showNotif('ลบข้อมูลทั้งหมดแล้ว');
}
</script>
</body>
</html>
