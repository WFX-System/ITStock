<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>RYG Stock — ประวัติ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<!-- SheetJS for Excel Export -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
.progress-bar{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin:.5rem 0;}
.progress-fill{height:100%;background:var(--g);border-radius:3px;transition:width .3s;}
</style>
</head>
<body>
<div id="loadingScreen">
  <div style="width:52px;height:52px;background:#1D9E75;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;">📦</div>
  <div style="font-size:15px;font-weight:700;">RYG Stock System</div>
  <div class="spinner"></div>
</div>
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-logo">📦</div>
    <span class="topbar-title">RYG Stock</span>
    <div class="user-mini">
      <img id="uAvatar" class="user-ava" src="" onerror="this.style.display='none'" alt=""/>
      <span id="uFallback" class="user-ava"></span>
      <span id="uName" class="user-name-top"></span>
      <span id="uRole" class="badge-role badge-admin"></span>
      <button class="btn-topout" onclick="doLogout()">ออก</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="content" id="mainContent"></div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>
<div id="notif"></div>

<script>
let currentUser=null, currentRole='user', db=null;
let historyData=[], filterType='all', searchQ='';
let _histUnsub=null;

initShell('history', (user, role, firestore) => {
  currentUser=user; currentRole=role; db=firestore;
  subscribeHistory();
});

function subscribeHistory(){
  if(_histUnsub){ _histUnsub(); _histUnsub=null; }

  // BUG FIX: ใช้แค่ orderBy('createdAt') ไม่มี .where() เพิ่ม
  // เพื่อหลีกเลี่ยง composite index ที่ต้องสร้างใน Firestore console
  // กรอง userId ฝั่ง client แทน
  const q = db.collection('transactions').orderBy('createdAt','desc').limit(500);

  _histUnsub = q.onSnapshot(snap => {
    let docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
    // กรอง user ปกติให้เห็นแค่ของตัวเอง (client-side)
    if(currentRole !== 'admin'){
      docs = docs.filter(h => h.userId === currentUser.uid);
    }
    historyData = docs;
    renderHistory();
  }, err => {
    console.error('History error:', err);
    // Fallback: ถ้า snapshot ไม่ได้ ลอง get แบบ one-time
    loadHistoryOnce();
  });
}

async function loadHistoryOnce(){
  try{
    const snap = await db.collection('transactions').orderBy('createdAt','desc').limit(500).get();
    let docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
    if(currentRole !== 'admin'){
      docs = docs.filter(h => h.userId === currentUser.uid);
    }
    historyData = docs;
    renderHistory();
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="empty-state" style="color:var(--r)">โหลดประวัติไม่สำเร็จ: ${e.message}</div>`;
  }
}

function safeFormatDT(ts){
  try{ return (typeof formatDT==='function') ? formatDT(ts) : ''; }
  catch(e){ return ''; }
}

function getFilteredData(){
  let data=historyData;
  if(filterType!=='all') data=data.filter(h=>h.type===filterType);
  if(searchQ){
    const q=searchQ.toLowerCase();
    data=data.filter(h=>
      (h.itemName||'').toLowerCase().includes(q)||
      (h.sn||'').toLowerCase().includes(q)||
      (h.serviceNo||'').toLowerCase().includes(q)||
      (h.usedAt||'').toLowerCase().includes(q)||
      (h.reqBy||'').toLowerCase().includes(q)||
      (h.dept||'').toLowerCase().includes(q)
    );
  }
  return data;
}

function renderHistory(){
  const data=getFilteredData();
  const isAdmin=currentRole==='admin';

  document.getElementById('mainContent').innerHTML=`
  <div class="flex jb items-c section-gap" style="flex-wrap:wrap;gap:8px">
    <span style="font-size:15px;font-weight:700">🕐 ประวัติ${currentRole==='user'?' (ของฉัน)':''}</span>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;gap:0;border:1px solid var(--bdrm);border-radius:var(--rad);overflow:hidden">
        ${['all','in','out'].map(t=>`
          <button style="padding:6px 12px;border:none;background:${filterType===t?'var(--g)':'var(--bg)'};color:${filterType===t?'#fff':'var(--tx2)'};cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font)"
            onclick="filterType='${t}';renderHistory()">
            ${{all:'ทั้งหมด',in:'📥 นำเข้า',out:'📤 เบิก'}[t]}
          </button>`).join('')}
      </div>
      <input class="search-input" style="min-width:140px;max-width:200px" placeholder="ค้นหา..." value="${searchQ}"
        oninput="searchQ=this.value;renderHistory()"/>
      ${isAdmin?`<button class="btn btn-sm" onclick="exportHistory()" title="Export ประวัติเป็น Excel">📥 Export</button><button class="btn btn-sm btn-danger" onclick="confirmDeleteHistory()" title="ลบประวัติทั้งหมด">🗑️ ลบทั้งหมด</button>`:''}
    </div>
  </div>
  <div class="fz12 txmute" style="margin-bottom:.7rem">${data.length} รายการ${historyData.length>data.length?' (กรองจาก '+historyData.length+')':''}</div>
  ${data.length===0?`<div class="empty-state">ยังไม่มีรายการ</div>`:`
  <div class="hist-list">
    ${data.map(h=>`
      <div class="hist-card">
        <div class="hist-top">
          <div class="hist-dot" style="background:${h.type==='in'?'#1D9E75':'#E24B4A'}"></div>
          <span class="hist-item">${h.itemName}</span>
          ${h.type==='in'?'<span class="badge badge-in">📥 นำเข้า</span>':'<span class="badge badge-out2">📤 เบิก</span>'}
        </div>
        ${(h.sn&&h.sn!=='-')?`<div class="hist-sn">S/N: ${h.sn}</div>`:''}
        <div class="hist-meta">
          ${h.usedAt?`📍 ${h.usedAt} · `:''}
          ${h.hasService==='yes'?'✅ ใบ Service ':h.hasService==='job'?'📋 Job Order ':''}
          ${h.serviceRef?`<span class="hist-ref">${h.serviceRef}</span> · `:''}
          ${h.dept?h.dept+' · ':''}
          ${isAdmin&&h.userName?h.userName+' · ':''}
          ${safeFormatDT(h.createdAt)}
        </div>
        ${h.serviceNo?`<div class="hist-ref" style="margin-top:3px">${h.serviceNo}</div>`:''}
      </div>`).join('')}
  </div>`}`;
}

function exportHistory(){
  const data=getFilteredData();
  if(!data.length){ showNotif('ไม่มีข้อมูลที่จะ Export','error'); return; }

  const wb=XLSX.utils.book_new();
  const rows=[['ประเภท','เลขที่ใบเบิก','รหัสสินค้า','ชื่อสินค้า','S/N','จำนวน','ใช้งานที่','แผนก','ผู้ดำเนินการ','ใบ Service','เลขอ้างอิง','หมายเหตุ','วันที่']];

  data.forEach(h=>{
    const typeTH=h.type==='in'?'📥 นำเข้า':'📤 เบิก';
    const svcTH={no:'ไม่มี',yes:'ใบ Service',job:'Job Order'}[h.hasService]||'';
    let dateStr='';
    try{
      if(h.createdAt?.toDate) dateStr=h.createdAt.toDate().toLocaleString('th-TH');
      else if(h.createdAt?.seconds) dateStr=new Date(h.createdAt.seconds*1000).toLocaleString('th-TH');
    }catch(e){}
    rows.push([typeTH,h.serviceNo||'',h.itemId||'',h.itemName||'',h.sn||'-',h.qty||1,h.usedAt||'',h.dept||'',h.userName||'',svcTH,h.serviceRef||'',h.note||'',dateStr]);
  });

  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:10},{wch:18},{wch:10},{wch:28},{wch:18},{wch:8},{wch:14},{wch:12},{wch:16},{wch:12},{wch:16},{wch:20},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'ประวัติ');

  const outRows=data.filter(h=>h.type==='out');
  const inRows=data.filter(h=>h.type==='in');
  if(outRows.length){
    const outWs=XLSX.utils.aoa_to_sheet([rows[0],...outRows.map(h=>{
      let ds=''; try{ if(h.createdAt?.toDate) ds=h.createdAt.toDate().toLocaleString('th-TH'); }catch(e){}
      const sv={no:'ไม่มี',yes:'ใบ Service',job:'Job Order'}[h.hasService]||'';
      return['📤 เบิก',h.serviceNo||'',h.itemId||'',h.itemName||'',h.sn||'-',h.qty||1,h.usedAt||'',h.dept||'',h.userName||'',sv,h.serviceRef||'',h.note||'',ds];
    })]);
    outWs['!cols']=ws['!cols'];
    XLSX.utils.book_append_sheet(wb,outWs,'เบิกออก');
  }
  if(inRows.length){
    const inWs=XLSX.utils.aoa_to_sheet([rows[0],...inRows.map(h=>{
      let ds=''; try{ if(h.createdAt?.toDate) ds=h.createdAt.toDate().toLocaleString('th-TH'); }catch(e){}
      return['📥 นำเข้า',h.serviceNo||'',h.itemId||'',h.itemName||'',h.sn||'-',h.qty||1,'','',h.userName||'','','','',ds];
    })]);
    inWs['!cols']=ws['!cols'];
    XLSX.utils.book_append_sheet(wb,inWs,'นำเข้า');
  }

  const now=new Date();
  const ds=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb,`RYG_History_${ds}.xlsx`);
  showNotif(`Export ${data.length} รายการสำเร็จ`);
}

// ─── DELETE ALL HISTORY ───
function confirmDeleteHistory(){
  const data = getFilteredData();
  if(!data.length){ showNotif('ไม่มีรายการที่จะลบ','error'); return; }
  const isFiltered = historyData.length > data.length || filterType!=='all' || searchQ;
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title" style="color:var(--r)">🗑️ ลบประวัติ</div>
    <div style="background:var(--rl);border:1px solid #f0a0a0;border-radius:var(--rad);padding:.75rem 1rem;margin-bottom:1rem">
      <div style="font-size:13px;font-weight:700">จะลบ ${data.length} รายการ${isFiltered?' (ตามตัวกรองปัจจุบัน)':' (ทั้งหมด)'}</div>
      <div style="font-size:12px;color:var(--tx2);margin-top:4px">
        ${filterType==='in'?'📥 เฉพาะรายการนำเข้า':filterType==='out'?'📤 เฉพาะรายการเบิก':'ทุกประเภท'}
        ${searchQ?' · ค้นหา: "'+searchQ+'"':''}
      </div>
    </div>
    <div style="font-size:12px;color:var(--tx3);margin-bottom:1rem">การกระทำนี้ไม่สามารถย้อนกลับได้</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-danger" onclick="doDeleteHistory()">🗑️ ยืนยันลบ</button>
    </div>`);
}

async function doDeleteHistory(){
  const data = getFilteredData();
  if(!data.length) return;
  closeModal();

  // แสดง progress
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state">
      <div style="font-size:24px;margin-bottom:8px">🗑️</div>
      <div style="font-weight:700;margin-bottom:8px">กำลังลบ ${data.length} รายการ...</div>
      <div class="progress-bar" style="width:200px;margin:0 auto">
        <div class="progress-fill" id="delProg" style="width:0%"></div>
      </div>
    </div>`;

  try{
    const CHUNK = 400;
    let done = 0;
    for(let s=0; s<data.length; s+=CHUNK){
      const batch = db.batch();
      data.slice(s, s+CHUNK).forEach(h => batch.delete(db.collection('transactions').doc(h.id)));
      await batch.commit();
      done += Math.min(CHUNK, data.length - s);
      const pg = document.getElementById('delProg');
      if(pg) pg.style.width = Math.round(done/data.length*100) + '%';
    }
    // อัปเดต local data
    const deletedIds = new Set(data.map(h=>h.id));
    historyData = historyData.filter(h => !deletedIds.has(h.id));
    showNotif(`ลบ ${data.length} รายการสำเร็จ`);
    renderHistory();
  }catch(e){
    showNotif('ลบไม่สำเร็จ: '+e.message,'error');
    renderHistory();
  }
}
</script>
</body>
</html>
