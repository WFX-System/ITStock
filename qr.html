<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>RYG Stock — QR Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<!-- jsQR for QR decoding -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
.qr-wrap{max-width:500px;margin:0 auto;}

/* Camera section */
.cam-section{background:#000;border-radius:var(--radlg);overflow:hidden;position:relative;aspect-ratio:1/1;max-height:320px;display:flex;align-items:center;justify-content:center;}
#camVideo{width:100%;height:100%;object-fit:cover;display:block;}
#camCanvas{display:none;}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.cam-frame{width:60%;aspect-ratio:1/1;border:2px solid rgba(29,158,117,.8);border-radius:12px;position:relative;}
.cam-frame::before,.cam-frame::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--g);border-style:solid;}
.cam-frame::before{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:6px 0 0 0;}
.cam-frame::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 6px 0;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--g),transparent);animation:scanAnim 2s ease-in-out infinite;}
@keyframes scanAnim{0%{top:5%}50%{top:90%}100%{top:5%}}
.cam-status{position:absolute;bottom:10px;left:0;right:0;text-align:center;color:#fff;font-size:12px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.7);}
.cam-status.found{color:#64d4aa;}

/* Cam controls */
.cam-controls{display:flex;gap:8px;margin-top:10px;}

/* Tabs */
.mode-tabs{display:flex;gap:0;border:1px solid var(--bdrm);border-radius:var(--rad);overflow:hidden;margin:.9rem 0;}
.mode-tab{flex:1;padding:10px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;background:var(--bg);color:var(--tx2);border:none;font-family:var(--font);}
.mode-tab.active{background:var(--g);color:#fff;}

/* Result card */
.result-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radlg);padding:1rem;margin:.9rem 0;}
.result-title{font-size:16px;font-weight:700;margin-bottom:.6rem;}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.8rem;}
.rg-item .lbl{font-size:11px;color:var(--tx3);margin-bottom:2px;}
.rg-item .val{font-size:13px;font-weight:600;}

/* S/N search */
.sn-search-wrap{position:relative;margin:.9rem 0;}
.sn-search-wrap input{width:100%;padding:11px 14px;padding-right:40px;border:2px solid var(--bdrm);border-radius:var(--rad);font-size:14px;font-family:var(--mono);background:var(--surf);}
.sn-search-wrap input:focus{outline:none;border-color:var(--g);}
.sn-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--tx3);}
.sn-result{background:var(--gll);border:1px solid var(--gl);border-radius:var(--rad);padding:.85rem 1rem;margin:.5rem 0;}
.sn-notfound{background:var(--rl);border:1px solid #F0A0A0;border-radius:var(--rad);padding:.85rem 1rem;color:var(--r);font-size:13px;font-weight:600;margin:.5rem 0;}

/* Op section */
.op-tabs{display:flex;gap:8px;margin:.9rem 0;}
.op-tab{flex:1;padding:10px;border:1px solid var(--bdrm);border-radius:var(--rad);cursor:pointer;font-size:13px;font-weight:600;text-align:center;color:var(--tx2);background:var(--bg);font-family:var(--font);}
.op-tab.active{background:var(--g);border-color:var(--g);color:#fff;}
</style>
</head>
<body>
<div id="loadingScreen">
  <div style="width:52px;height:52px;background:#1D9E75;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;">📦</div>
  <div style="font-size:15px;font-weight:700;">RYG Stock System</div>
  <div class="spinner"></div>
</div>
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-logo">📦</div>
    <span class="topbar-title">RYG Stock</span>
    <div class="user-mini">
      <img id="uAvatar" class="user-ava" src="" onerror="this.style.display='none'" alt=""/>
      <span id="uFallback" class="user-ava"></span>
      <span id="uName" class="user-name-top"></span>
      <span id="uRole" class="badge-role badge-admin"></span>
      <button class="btn-topout" onclick="doLogout()">ออก</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="content" id="mainContent"></div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>
<div id="notif"></div>

<script>
let allItems=[], allUnits=[], currentUser=null, currentRole='user', db=null;
let mainMode='cam'; // 'cam' | 'sn' | 'select'
let camStream=null, scanInterval=null, camActive=false;
let scannedItem=null, scannedUnit=null, scanOp='out';
let snSearchQ='', snResults=[];

initShell('qr', async (user, role, firestore) => {
  currentUser=user; currentRole=role; db=firestore;
  await loadItems(); await loadUnits();
  renderQR();
});

async function loadItems(){
  const snap=await db.collection('items').orderBy('id').get();
  allItems=snap.docs.map(d=>({docId:d.id,...d.data()}));
}
async function loadUnits(){
  const snap=await db.collection('units').get();
  allUnits=snap.docs.map(d=>({docId:d.id,...d.data()}));
}
const getAvail=id=>allUnits.filter(u=>u.itemId===id&&u.status==='available');
const getItemQty=id=>getAvail(id).length;

function getStatus(id){
  const q=getItemQty(id),item=allItems.find(i=>i.id===id);
  if(!item)return'ok'; if(q<=0)return'out'; if(q<=(item.min||1))return'low'; return'ok';
}
function statusBadge(id){
  const s=getStatus(id);
  if(s==='out')return'<span class="badge badge-out">หมดสต็อก</span>';
  if(s==='low')return'<span class="badge badge-low">ใกล้หมด</span>';
  return'<span class="badge badge-ok">ปกติ</span>';
}
function snBadge(u){ return u.sn&&u.sn!=='-'?`<span class="badge badge-sn">${u.sn}</span>`:`<span class="unit-nosn">ไม่มี S/N</span>`; }

// ─── MAIN RENDER ───
function renderQR(){
  const isAdmin=currentRole==='admin';
  document.getElementById('mainContent').innerHTML=`
  <div class="qr-wrap">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">📷 QR / S/N Scanner</div>
    <div class="fz12 txmute" style="margin-bottom:.7rem">สแกน QR Code หรือค้นหาด้วย S/N</div>

    <div class="mode-tabs">
      <button class="mode-tab ${mainMode==='cam'?'active':''}" onclick="switchMode('cam')">📷 กล้อง</button>
      <button class="mode-tab ${mainMode==='sn'?'active':''}" onclick="switchMode('sn')">🔍 ค้นหา S/N</button>
      <button class="mode-tab ${mainMode==='select'?'active':''}" onclick="switchMode('select')">📋 เลือกรายการ</button>
    </div>

    <div id="modeBody">${renderModeBody(isAdmin)}</div>
  </div>`;

  // auto-start camera if in cam mode
  if(mainMode==='cam') setTimeout(startCamera, 100);
}

function renderModeBody(isAdmin){
  if(mainMode==='cam') return renderCamMode(isAdmin);
  if(mainMode==='sn')  return renderSNMode(isAdmin);
  return renderSelectMode(isAdmin);
}

// ─── CAMERA MODE ───
function renderCamMode(isAdmin){
  return`
    <div class="cam-section" id="camSection">
      <video id="camVideo" autoplay playsinline muted></video>
      <canvas id="camCanvas"></canvas>
      <div class="cam-overlay">
        <div class="cam-frame">
          ${camActive?'<div class="scan-line"></div>':''}
        </div>
      </div>
      <div class="cam-status" id="camStatus">${camActive?'กำลังสแกน...':'กดเริ่มกล้อง'}</div>
    </div>
    <div class="cam-controls">
      <button class="btn btn-primary" style="flex:1;justify-content:center" id="camBtn" onclick="toggleCamera()">
        ${camActive?'⏹ หยุดกล้อง':'📷 เริ่มสแกน'}
      </button>
      ${camActive?`<button class="btn btn-sm" onclick="flipCamera()" title="สลับกล้อง">🔄</button>`:''}
    </div>
    ${scannedItem?renderResultSection(isAdmin):''}`;
}

let facingMode='environment';
async function startCamera(){
  if(camActive) return;
  try {
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{ facingMode, width:{ideal:1280}, height:{ideal:720} }
    });
    camStream=stream; camActive=true;
    const video=document.getElementById('camVideo');
    if(!video){stopCameraRaw();return;}
    video.srcObject=stream;
    video.onloadedmetadata=()=>{ video.play(); startScanLoop(); };
    document.getElementById('camStatus').textContent='กำลังสแกน...';
    document.getElementById('camBtn').textContent='⏹ หยุดกล้อง';
    // add scan line
    const frame=document.querySelector('.cam-frame');
    if(frame&&!frame.querySelector('.scan-line')){
      const sl=document.createElement('div');sl.className='scan-line';frame.appendChild(sl);
    }
  } catch(e) {
    showNotif('ไม่สามารถเปิดกล้องได้: '+e.message,'error');
    document.getElementById('camStatus').textContent='❌ ไม่สามารถเปิดกล้อง';
  }
}

function stopCameraRaw(){
  if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  camActive=false;
}

function toggleCamera(){
  if(camActive){ stopCameraRaw(); renderQR(); }
  else startCamera();
}

async function flipCamera(){
  facingMode=facingMode==='environment'?'user':'environment';
  stopCameraRaw();
  await startCamera();
}

function startScanLoop(){
  if(scanInterval) clearInterval(scanInterval);
  scanInterval=setInterval(()=>{
    const video=document.getElementById('camVideo');
    const canvas=document.getElementById('camCanvas');
    if(!video||!canvas||video.readyState<2)return;
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(video,0,0);
    const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'dontInvert'});
    if(code&&code.data){
      handleQRData(code.data);
    }
  },300);
}

function handleQRData(raw){
  // raw can be: item ID (SP001), S/N string, or JSON
  stopCameraRaw();
  let found=false;

  // Try parse JSON
  try{
    const j=JSON.parse(raw);
    if(j.itemId){ scannedItem=allItems.find(i=>i.id===j.itemId); found=!!scannedItem; }
    if(j.sn){ scannedUnit=allUnits.find(u=>u.sn===j.sn); if(scannedUnit)scannedItem=allItems.find(i=>i.id===scannedUnit.itemId); found=!!scannedItem; }
  }catch(e){}

  if(!found){
    // Try item ID
    const byId=allItems.find(i=>i.id===raw.toUpperCase().trim());
    if(byId){scannedItem=byId;found=true;}
  }
  if(!found){
    // Try S/N
    const bySN=allUnits.find(u=>u.sn&&u.sn.toLowerCase()===raw.toLowerCase().trim());
    if(bySN){scannedUnit=bySN;scannedItem=allItems.find(i=>i.id===bySN.itemId);found=!!scannedItem;}
  }

  if(found){
    document.getElementById('camStatus').textContent='✅ พบสินค้า!';
    document.getElementById('camStatus').className='cam-status found';
    showNotif('สแกนสำเร็จ: '+scannedItem.name);
  } else {
    scannedItem=null;scannedUnit=null;
    showNotif('ไม่พบสินค้า: '+raw,'error');
    document.getElementById('camStatus').textContent='❌ ไม่พบข้อมูล';
  }
  document.getElementById('modeBody').innerHTML=renderModeBody(currentRole==='admin');
}

// ─── S/N SEARCH MODE ───
function renderSNMode(isAdmin){
  const q=snSearchQ.trim().toLowerCase();
  const results=q.length>=1 ? allUnits.filter(u=>u.sn&&u.sn!=='-'&&u.sn.toLowerCase().includes(q)) : [];

  return`
    <div class="info-box">🔍 พิมพ์ S/N เพื่อค้นหาชิ้นส่วน สามารถพิมพ์บางส่วนได้</div>
    <div class="sn-search-wrap">
      <input type="text" id="snInput" placeholder="ค้นหา S/N..." value="${snSearchQ}"
        oninput="snSearchQ=this.value;document.getElementById('snResults').innerHTML=renderSNResults()"
        style="font-family:var(--mono);font-size:14px"/>
      ${snSearchQ?`<button class="sn-clear" onclick="snSearchQ='';document.getElementById('snInput').value='';document.getElementById('snResults').innerHTML=renderSNResults()">✕</button>`:''}
    </div>
    <div id="snResults">${renderSNResults()}</div>
    ${scannedItem?renderResultSection(isAdmin):''}`;
}

function renderSNResults(){
  const q=snSearchQ.trim().toLowerCase();
  if(!q) return '<div class="fz12 txmute" style="text-align:center;padding:1rem">พิมพ์เพื่อค้นหา S/N</div>';
  const results=allUnits.filter(u=>u.sn&&u.sn!=='-'&&u.sn.toLowerCase().includes(q)).slice(0,20);
  if(!results.length) return `<div class="sn-notfound">❌ ไม่พบ S/N ที่ตรงกับ "${snSearchQ}"</div>`;

  return`<div class="unit-picker">
    ${results.map(u=>{
      const item=allItems.find(i=>i.id===u.itemId);
      const stColor=u.status==='available'?'var(--g)':u.status==='damaged'?'#E5A600':'#aaa';
      return`<div class="unit-pick-row" onclick="selectUnitResult('${u.docId}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${stColor};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="badge badge-sn">${u.sn}</span>
            <span class="fz12 fw7">${item?item.name:'ไม่รู้จัก'}</span>
          </div>
          <div class="fz11 txmute">${u.detail||'—'} · ${u.status==='available'?'✅ พร้อมใช้':u.status==='damaged'?'🔧 ชำรุด':'📤 เบิกแล้ว'}</div>
        </div>
        <span class="fz11 txmute">→</span>
      </div>`;
    }).join('')}
  </div>`;
}

function selectUnitResult(uid){
  scannedUnit=allUnits.find(u=>u.docId===uid);
  scannedItem=scannedUnit?allItems.find(i=>i.id===scannedUnit.itemId):null;
  snSearchQ='';
  document.getElementById('modeBody').innerHTML=renderModeBody(currentRole==='admin');
}

// ─── SELECT MODE ───
function renderSelectMode(isAdmin){
  return`
    <div class="field">
      <label>เลือกสินค้า</label>
      <select onchange="selectItem(this.value)" style="font-size:13px">
        <option value="">— เลือกรายการ —</option>
        ${allItems.map(i=>`<option value="${i.id}">${i.id} – ${i.name} (${getItemQty(i.id)} ชิ้น)</option>`).join('')}
      </select>
    </div>
    ${scannedItem?renderResultSection(isAdmin):''}`;
}

function selectItem(id){
  if(!id)return;
  scannedItem=allItems.find(i=>i.id===id);
  scannedUnit=null;
  document.getElementById('modeBody').innerHTML=renderModeBody(currentRole==='admin');
}

// ─── RESULT SECTION ───
function renderResultSection(isAdmin){
  if(!scannedItem)return'';
  const avail=getAvail(scannedItem.id);
  const qty=avail.length;
  return`
  <div class="result-card">
    <div class="flex jb items-c" style="margin-bottom:.7rem">
      <div class="result-title">${scannedItem.name}</div>
      ${statusBadge(scannedItem.id)}
    </div>
    <div class="result-grid">
      <div class="rg-item"><div class="lbl">รหัส</div><div class="val mono">${scannedItem.id}</div></div>
      <div class="rg-item"><div class="lbl">คงเหลือ</div><div class="val" style="font-size:18px">${qty} ชิ้น</div></div>
      <div class="rg-item"><div class="lbl">กลุ่ม</div><div class="val">${scannedItem.cat}</div></div>
      <div class="rg-item"><div class="lbl">สถานที่</div><div class="val">${scannedItem.loc}</div></div>
    </div>
    ${scannedUnit?`
    <div style="background:var(--pul);border-radius:var(--radsm);padding:8px 10px;margin-bottom:8px">
      <div class="fz11 txmute">ชิ้นส่วนที่เลือก</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
        <span class="badge badge-sn">${scannedUnit.sn}</span>
        <span class="fz12">${scannedUnit.detail||'—'}</span>
        <span class="badge ${scannedUnit.status==='available'?'badge-avail':scannedUnit.status==='damaged'?'badge-dmg':'badge-used2'}">${scannedUnit.status==='available'?'พร้อมใช้':scannedUnit.status==='damaged'?'ชำรุด':'เบิกแล้ว'}</span>
      </div>
    </div>`:''}
    ${avail.length>0&&!scannedUnit?`
    <div style="margin-bottom:8px">
      <div class="fz11 txmute fw7" style="margin-bottom:4px">S/N พร้อมใช้:</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${avail.slice(0,12).map(u=>u.sn&&u.sn!=='-'?`<span class="badge badge-sn">${u.sn}</span>`:`<span class="unit-nosn" style="font-size:10px">—</span>`).join('')}
        ${avail.length>12?`<span class="fz11 txmute">+${avail.length-12} อื่นๆ</span>`:''}
      </div>
    </div>`:''}

    ${isAdmin?`
    <div class="op-tabs">
      <div class="op-tab ${scanOp==='out'?'active':''}" onclick="scanOp='out';refreshResult()">📤 เบิกออก</div>
      <div class="op-tab ${scanOp==='in'?'active':''}" onclick="scanOp='in';refreshResult()">📥 นำเข้า</div>
    </div>
    ${scanOp==='out'&&avail.length>0?`
    <div class="fz12 fw7 txm" style="margin-bottom:6px">เลือกชิ้นที่จะเบิก:</div>
    <div class="unit-picker">
      ${avail.slice(0,20).map(u=>`
        <label class="unit-pick-row">
          <input type="checkbox" class="upick-cb" value="${u.docId}" ${scannedUnit&&scannedUnit.docId===u.docId?'checked':''}/>
          ${u.sn&&u.sn!=='-'?`<span class="badge badge-sn">${u.sn}</span>`:`<span class="unit-nosn">—</span>`}
          <span class="fz12 txm" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.detail||'ไม่มีรายละเอียด'}</span>
        </label>`).join('')}
    </div>
    <div class="field" style="margin-top:10px"><label>ใช้งานที่ *</label><input id="qrUAt" placeholder="เช่น PC-05"/></div>
    <div class="field"><label>หมายเหตุ</label><input id="qrNote" placeholder="ระบุรายละเอียด"/></div>
    <button class="btn btn-primary btn-full" onclick="doQROp()">✅ ยืนยันการเบิก</button>`:''}
    ${scanOp==='out'&&avail.length===0?`<div style="color:var(--r);font-size:13px;font-weight:600;padding:8px 0">❌ ไม่มีชิ้นส่วนพร้อมใช้</div>`:''}
    ${scanOp==='in'?`<div class="info-box">💡 ใช้ปุ่ม +📦 ในหน้าสต็อกเพื่อนำเข้าพร้อม S/N</div>`:''}
    `:`<div class="info-box" style="background:var(--bl);color:var(--b)">ℹ️ เฉพาะ Admin เท่านั้นที่เบิก/นำเข้าได้</div>`}

    <button class="btn btn-full" style="margin-top:8px" onclick="resetResult()">🔄 ล้าง / สแกนใหม่</button>
  </div>`;
}

function refreshResult(){
  document.getElementById('modeBody').innerHTML=renderModeBody(currentRole==='admin');
  if(mainMode==='cam'&&camActive) startScanLoop();
}

function resetResult(){
  scannedItem=null; scannedUnit=null; scannedUnit=null;
  stopCameraRaw(); camActive=false;
  renderQR();
}

function switchMode(mode){
  stopCameraRaw(); camActive=false;
  mainMode=mode;
  document.getElementById('modeBody').innerHTML=renderModeBody(currentRole==='admin');
  // mode tabs highlight
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    t.classList.toggle('active', ['cam','sn','select'][i]===mode);
  });
  if(mode==='cam') setTimeout(startCamera,100);
}

async function doQROp(){
  const cbs=[...document.querySelectorAll('.upick-cb:checked')];
  if(!cbs.length){showNotif('เลือกอย่างน้อย 1 ชิ้น','error');return;}
  const usedAt=document.getElementById('qrUAt')?.value.trim()||'';
  if(!usedAt){showNotif('ระบุสถานที่ใช้งาน','error');return;}
  const note=document.getElementById('qrNote')?.value||'';
  const svcNo=genNo();
  const batch=db.batch();
  cbs.forEach(cb=>{
    const uid=cb.value;
    const u=allUnits.find(x=>x.docId===uid);
    batch.update(db.collection('units').doc(uid),{status:'used',usedAtLabel:usedAt,usedAt:firebase.firestore.FieldValue.serverTimestamp(),usedBy:currentUser.displayName,usedTxId:svcNo});
    batch.set(db.collection('transactions').doc(),{
      type:'out',serviceNo:svcNo,itemId:scannedItem.id,itemName:scannedItem.name,qty:1,
      sn:u?.sn||'-',unitId:uid,detail:u?.detail||'',usedAt,note,source:'qr_scan',
      userId:currentUser.uid,userEmail:currentUser.email,userName:currentUser.displayName,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  });
  await batch.commit();
  cbs.forEach(cb=>{const u=allUnits.find(x=>x.docId===cb.value);if(u){u.status='used';u.usedAtLabel=usedAt;}});
  showNotif(`เบิก ${cbs.length} ชิ้นสำเร็จ`);
  resetResult();
}
</script>
</body>
</html>
